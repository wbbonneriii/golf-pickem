function buildPools(rankings, firstTimers, ftAmateurs) {
  const info = {};
  rankings.forEach(function(p) { info[p.name] = { rank: p.rank, country: p.country, amateur: p.amateur || false }; });
  firstTimers.forEach(function(n) { if (!info[n]) { info[n] = { rank: 999, country: "?", amateur: ftAmateurs.has(n) }; } });
  const top10 = rankings.filter(function(p) { return p.rank <= 10; }).map(function(p) { return p.name; });
  const intl = rankings.filter(function(p) { return p.country !== "USA"; }).map(function(p) { return p.name; });
  const noMajor = rankings.filter(function(p) { return !MAJOR_WINNERS.has(p.name); }).map(function(p) { return p.name; });
  firstTimers.forEach(function(n) { if (!MAJOR_WINNERS.has(n) && !noMajor.includes(n)) { noMajor.push(n); } });
  const all = [...new Set([...rankings.map(function(p) { return p.name; }), ...firstTimers])].sort();
  return { info: info, top10: top10, intl: intl, noMajor: noMajor, firstTimers: firstTimers, all: all };
}

function genId() { return Math.random().toString(36).substring(2, 10) + Date.now().toString(36); }
function snake(n, t) { const o = []; let r = 0; while (o.length < t) { if (r % 2 === 0) { for (let i = 0; i < n && o.length < t; i++) o.push(i); } else { for (let i = n - 1; i >= 0; i--) { if (o.length < t) o.push(i); } } r++; } return o; }
function loadGames() { try { return JSON.parse(localStorage.getItem("golfPickemGames") || "{}"); } catch(e) { return {}; } }
function saveGames(g) { localStorage.setItem("golfPickemGames", JSON.stringify(g)); }
function fmtScore(s) { if (s === 0) return "E"; if (s > 0) return "+" + s; return "" + s; }
function loadSavedRankings() { try { const d = JSON.parse(localStorage.getItem("golfPickemRankings")); if (d && d.rankings) return d; } catch(e) {} return null; }
function saveSavedRankings(d) { localStorage.setItem("golfPickemRankings", JSON.stringify(d)); }
function loadSavedFT() { try { const d = JSON.parse(localStorage.getItem("golfPickemFT")); if (d) return d; } catch(e) {} return null; }
function saveSavedFT(d) { localStorage.setItem("golfPickemFT", JSON.stringify(d)); }

function App() {
  const [games, setGames] = useState(loadGames);
  const [curId, setCurId] = useState(null);
  const [view, setView] = useState("home");
  const [year, setYear] = useState(2026);

    { id: "top10_1", label: "Top 10 Pick #1", desc: "A player in the Top 10 of the official world golf rankings", pool: pools.top10 },

  useEffect(() => { const h = window.location.hash; if (h.startsWith("#/share/")) { const id = h.replace("#/share/", ""); const g = loadGames(); if (g[id]) { setGames(g); setCurId(id); setView("scoreboard"); } } }, []);

  const game = curId ? games[curId] : null;
  const majors = getMajors(year);

  async function syncRankings() {
    setSyncing(true);
    setSyncMsg("Fetching from OWGR...");
    const owgrUrl = "https://apiweb.owgr.com/api/owgr/rankings/getRankings?regionId=0&pageSize=100&pageNumber=1&countryId=0&sortString=Rank+ASC";
    const urls = [owgrUrl, "https://corsproxy.io/?" + encodeURIComponent(owgrUrl), "https://api.allorigins.win/raw?url=" + encodeURIComponent(owgrUrl)];
    let data = null;
    for (const url of urls) {
      try {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), 8000);
        const r = await fetch(url, { signal: controller.signal });
        clearTimeout(timer);
        const json = await r.json();
        if (json.rankingsList) { data = json; break; }
      } catch (e) { /* try next */ }
    }
    if (!data) {
      setSyncMsg("Cannot reach OWGR from here. This works on GitHub Pages. Built-in rankings: April 12, 2026.");
      setSyncing(false);
      return;
    }
    const nr = data.rankingsList.map(function(r) { return { name: r.player.fullName, rank: r.rank, country: r.player.country.code3 || r.player.country.name, amateur: r.player.isAmateur || false }; });
    const ds = data.rankingsList[0]?.weekEndDate || new Date().toLocaleDateString();
    const sv = { rankings: nr, date: ds };
    saveSavedRankings(sv);
    setRkState(sv);
    setSyncMsg("Updated! " + nr.length + " players from OWGR (" + ds + ")");
    setSyncing(false);
  }

  const [scoreSyncing, setScoreSyncing] = useState(false);
  const [scoreSyncMsg, setScoreSyncMsg] = useState("");

  async function syncScores() {
    if (!game) return;
    setScoreSyncing(true);
    setScoreSyncMsg("Fetching from ESPN...");

    // Map our major IDs to ESPN tournament name keywords
    var majorKeywords = {
      masters: "Masters",
      pga: "PGA Championship",
      usopen: "U.S. Open",
      open: "Open Championship"
    };
    var keyword = majorKeywords[game.majorId] || game.major?.name || "";

    // Fetch the full season schedule for the game's year — this includes all events with scores
    var espnUrl = "https://site.api.espn.com/apis/site/v2/sports/golf/pga/scoreboard?dates=" + game.year;
    var urls = [espnUrl, "https://corsproxy.io/?" + encodeURIComponent(espnUrl), "https://api.allorigins.win/raw?url=" + encodeURIComponent(espnUrl)];
    var data = null;
    for (var u = 0; u < urls.length; u++) {
      try {
        var controller = new AbortController();
        var timer = setTimeout(function() { controller.abort(); }, 12000);
        var r = await fetch(urls[u], { signal: controller.signal });
        clearTimeout(timer);
        var json = await r.json();
        if (json.events && json.events.length > 0) { data = json; break; }
      } catch (e) { /* try next */ }
    }
    if (!data) {
      setScoreSyncMsg("Cannot reach ESPN. This works on GitHub Pages.");
      setScoreSyncing(false);
      return;
    }

    // Find the matching major tournament in the season events
    var ev = null;
    for (var i = 0; i < data.events.length; i++) {
      var evName = data.events[i].name || "";
      if (evName.toLowerCase().includes(keyword.toLowerCase())) {
        ev = data.events[i];
        break;
      }
    }
    if (!ev) {
      setScoreSyncMsg("Could not find " + keyword + " " + game.year + " in ESPN data. Found: " + data.events.map(function(e) { return e.name; }).slice(0, 5).join(", ") + "...");
      setScoreSyncing(false);
      return;
    }

    var comps = ev.competitions?.[0]?.competitors || [];
    if (comps.length === 0) {
      setScoreSyncMsg("Found " + ev.name + " but no player scores available yet.");
      setScoreSyncing(false);
      return;
    }

    // Build ESPN data lookup by player name
    var espnData = {};
    comps.forEach(function(c) {
      var name = c.athlete?.displayName;
      var scoreStr = c.score || "0";
      if (name) {
        var scoreNum = 0;
        if (scoreStr === "E") scoreNum = 0;
        else scoreNum = parseInt(scoreStr) || 0;
        var rounds = c.linescores?.length || 0;
        var statusName = (c.status?.type?.name || "").toLowerCase();
        var missedCut = statusName.includes("cut") || (rounds === 2 && comps.some(function(x) { return (x.linescores?.length || 0) > 2; }));
        var madeCut = rounds > 2;
        espnData[name] = { score: scoreNum, rounds: rounds, madeCut: madeCut, missedCut: missedCut };
      }
    });

    var pastCut = comps.some(function(c) { return (c.linescores?.length || 0) > 2; });

    // Update all players in the game
    var newScores = { ...game.scores };
    var newCutStatus = { ...game.cutStatus };
    var matched = 0;
    Object.keys(newScores).forEach(function(playerName) {
      if (espnData[playerName] !== undefined) {
        newScores[playerName] = { ...newScores[playerName], total: espnData[playerName].score };
        matched++;
        if (pastCut) {
          newCutStatus[playerName] = espnData[playerName].madeCut;
        }
      }
    });
    upd({ scores: newScores, cutStatus: newCutStatus });
    var cutMsg = pastCut ? " Cut status updated." : "";
    setScoreSyncMsg("✅ " + ev.name + " scores synced! " + matched + "/" + Object.keys(newScores).length + " players matched." + cutMsg);
    setScoreSyncing(false);
  }

  function addFT(name, amateur) {
    const cur = ftState || { list: [...DEFAULT_FIRST_TIMERS], amateurs: [...DEFAULT_FT_AMATEURS] };
    if (!cur.list.includes(name)) {
      const upd = { list: [...cur.list, name], amateurs: amateur ? [...(cur.amateurs || []), name] : (cur.amateurs || []) };
      saveSavedFT(upd);
      setFtState(upd);
    }
  }
  function removeFT(name) {
    const cur = ftState || { list: [...DEFAULT_FIRST_TIMERS], amateurs: [...DEFAULT_FT_AMATEURS] };
    const upd = { list: cur.list.filter(function(n) { return n !== name; }), amateurs: (cur.amateurs || []).filter(function(n) { return n !== name; }) };
    saveSavedFT(upd);
    setFtState(upd);
  }

  function gamesFor(mid) { return Object.values(games).filter(function(g) { return g.majorId === mid && g.year === year; }); }
  function goHome() { setView("home"); setCurId(null); setSetupStep("count"); setShowAdmin(false); }
  function startSetup(mid) { setSetupMajor(mid); setNumUsers(2); setNames(["", ""]); setSetupStep("count"); setView("setup"); }
  function createGame() {
    const id = genId(); const major = majors.find(function(m) { return m.id === setupMajor; });
    const g = { id: id, year: year, majorId: setupMajor, major: major, users: names.slice(0, numUsers).map(function(n) { return n.trim() || "Player"; }), picks: {}, altPicks: {}, scores: {}, cutStatus: {}, draftOrder: [], draftIndex: 0, draftComplete: false, swaps: {} };
    const mo = snake(numUsers, numUsers * 5); const ao = snake(numUsers, numUsers * 2);
    g.draftOrder = [...mo.map(function(u) { return { user: u, type: "main" }; }), ...ao.map(function(u) { return { user: u, type: "alt" }; })];
    setGames(function(p) { return { ...p, [id]: g }; }); setCurId(id); setView("draft");
  }
  function upd(u) { setGames(function(p) { return { ...p, [curId]: { ...p[curId], ...u } }; }); }
  function resetDraft() { if (!game) return; upd({ picks: {}, altPicks: {}, scores: {}, cutStatus: {}, draftIndex: 0, draftComplete: false, swaps: {} }); }
  function pickedSet() { if (!game) return new Set(); const s = new Set(); Object.values(game.picks).forEach(function(up) { Object.values(up).forEach(function(p) { s.add(p); }); }); Object.values(game.altPicks).forEach(function(ua) { Object.values(ua).forEach(function(p) { s.add(p); }); }); return s; }
  function makePick(player, catId) {
    if (!game) return; const step = game.draftOrder[game.draftIndex]; const ui = step.user;
    if (step.type === "main") { const up = { ...(game.picks[ui] || {}) }; up[catId] = player; const np = { ...game.picks, [ui]: up }; const ns = { ...game.scores, [player]: game.scores[player] || { total: 0 } }; const ni = game.draftIndex + 1; upd({ picks: np, scores: ns, draftIndex: ni, draftComplete: ni >= game.draftOrder.length }); }
    else { const ua = { ...(game.altPicks[ui] || {}) }; const ak = Object.keys(ua).length === 0 ? "alt_1" : "alt_2"; ua[ak] = player; const na = { ...game.altPicks, [ui]: ua }; const ns = { ...game.scores, [player]: game.scores[player] || { total: 0 } }; const ni = game.draftIndex + 1; upd({ altPicks: na, scores: ns, draftIndex: ni, draftComplete: ni >= game.draftOrder.length }); }
    setDraftSel({});
  }
  function updScore(p, v) { if (!game) return; upd({ scores: { ...game.scores, [p]: { ...game.scores[p], total: parseInt(v) || 0 } } }); }
  function togCut(p) { if (!game) return; upd({ cutStatus: { ...game.cutStatus, [p]: !game.cutStatus[p] } }); }
  function swapPlayer(ui, mc, ac) { if (!game) return; const np = { ...game.picks, [ui]: { ...game.picks[ui] } }; const na = { ...game.altPicks, [ui]: { ...game.altPicks[ui] } }; np[ui][mc] = na[ui][ac]; delete na[ui][ac]; upd({ picks: np, altPicks: na }); }
  function shareGame() { if (!game) return; const url = window.location.origin + window.location.pathname + "#/share/" + curId; navigator.clipboard.writeText(url).then(function() { setShareMsg("Link copied!"); }).catch(function() { setShareMsg(url); }); setTimeout(function() { setShareMsg(""); }, 4000); }
  function markWinner(p) { if (!game) return; const ns = { ...game.scores }; Object.keys(ns).forEach(function(k) { ns[k] = { ...ns[k], isWinner: k === p }; }); upd({ scores: ns }); }

  function calcWinner() {
    if (!game || !game.draftComplete) return null;
    const us = game.users.map(function(_, i) {
      const pk = game.picks[i] || {};
      let t = 0, c = 0, tw = false;
      Object.values(pk).forEach(function(p) {
        t += game.scores[p]?.total || 0;
        if (game.cutStatus[p]) c++;
        if (game.scores[p]?.isWinner) tw = true;
      });
      return { i: i, t: t, c: c, tw: tw };
    });
    // Rule 1: Whoever picks the tournament winner automatically wins
    const twu = us.find(function(u) { return u.tw; });
    if (twu) return { ...twu, reason: "tourney_winner" };
    // Rule 3: If one user has MORE cuts than others, they win
    const maxCuts = Math.max(...us.map(function(u) { return u.c; }));
    const withMaxCuts = us.filter(function(u) { return u.c === maxCuts; });
    if (withMaxCuts.length === 1) return { ...withMaxCuts[0], reason: "most_cuts" };
    // Rule 2: If users have the same number of cuts, lowest cumulative score wins
    withMaxCuts.sort(function(a, b) { return a.t - b.t; });
    return { ...withMaxCuts[0], reason: "lowest_score" };
  }
  const winner = useMemo(calcWinner, [game?.scores, game?.cutStatus, game?.picks]);
  function winnerText() {
    if (!winner) return null;
    const nm = game.users[winner.i];
    if (winner.reason === "tourney_winner") return "🏆 " + nm + " wins — Picked the tournament winner!";
    if (winner.reason === "most_cuts") return "🏆 " + nm + " wins — Most players made the cut (" + winner.c + "/" + Object.keys(game.picks[winner.i] || {}).length + ")";
    return "🏆 " + nm + " wins — Lowest cumulative score (" + fmtScore(winner.t) + ")";
  }
  function pLabel(n) { const i = pools.info[n]; if (!i) return n; let s = n; if (i.rank && i.rank < 500) s += " #" + i.rank; if (i.amateur) s += " (A)"; return s; }

  const [showScoreEdit, setShowScoreEdit] = useState(false);

  // ─── HOME ────────────────────────────────────────────────────────
  if (view === "home") {
    return (
      <Shell onGoHome={goHome}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20, flexWrap: "wrap", gap: 16 }}>
          <h2 style={{ margin: 0, fontSize: 26, fontWeight: 700 }}>{year} Men's Golf Majors</h2>
          <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
            <div style={{ display: "flex", border: "1px solid #ccc", borderRadius: 8, overflow: "hidden" }}>
              {YEARS.map(function(y) { return (<button key={y} onClick={function() { setYear(y); }} style={{ padding: "8px 20px", fontSize: 14, fontWeight: 600, border: "none", cursor: "pointer", background: y === year ? "#2d5a3d" : "#fff", color: y === year ? "#fff" : "#333", borderRight: "1px solid #ccc", ...SF }}>{y}</button>); })}
            </div>
            <button onClick={function() { setShowAdmin(!showAdmin); }} style={{ background: "#fff", color: "#555", border: "1px solid #ccc", borderRadius: 8, padding: "8px 14px", fontSize: 13, fontWeight: 600, cursor: "pointer", ...SF }}>⚙️ Admin</button>
          </div>
        </div>

        {showAdmin && (
          <div style={{ background: "#fff", border: "1px solid #ddd", borderRadius: 12, padding: 24, marginBottom: 24 }}>
            <h3 style={{ margin: "0 0 16px", fontSize: 18, fontWeight: 700 }}>Admin Panel</h3>
            <div style={{ marginBottom: 20, paddingBottom: 16, borderBottom: "1px solid #eee" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 10 }}>
                <div>
                  <div style={{ fontSize: 15, fontWeight: 700, ...SF }}>World Rankings</div>
                  <div style={{ fontSize: 12, color: "#888", marginTop: 2, ...SF }}>Last updated: {rkDate} · {rk.length} players</div>
                </div>
                <button onClick={syncRankings} disabled={syncing} style={{ background: "#2d5a3d", color: "#fff", border: "none", borderRadius: 8, padding: "8px 20px", fontSize: 13, fontWeight: 600, cursor: syncing ? "not-allowed" : "pointer", opacity: syncing ? 0.6 : 1, ...SF }}>
                  {syncing ? "Syncing..." : "⚡ Sync from OWGR"}
                </button>
              </div>
              {syncMsg && <div style={{ marginTop: 8, fontSize: 12, color: syncMsg.includes("Updated") ? "#2d5a3d" : "#c0392b", ...SF }}>{syncMsg}</div>}
            </div>
            <div>
              <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 8, ...SF }}>First Timers ({ft.length})</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 12 }}>
                {ft.map(function(n) { return (
                  <span key={n} style={{ display: "inline-flex", alignItems: "center", gap: 6, background: "#f0f0ee", borderRadius: 20, padding: "4px 12px", fontSize: 13, ...SF }}>
                    {n}{ftAm.has(n) && <span style={{ color: "#b8860b", fontWeight: 600 }}>(A)</span>}
                    <button onClick={function() { removeFT(n); }} style={{ background: "none", border: "none", cursor: "pointer", color: "#c0392b", fontSize: 14, padding: 0, lineHeight: 1 }}>×</button>
                  </span>
                ); })}
              </div>
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                <input value={newFT} onChange={function(e) { setNewFT(e.target.value); }} placeholder="Add player name..." style={{ flex: 1, padding: "8px 12px", borderRadius: 8, border: "1px solid #ccc", fontSize: 14, ...SF }} />
                <label style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 13, ...SF }}>
                  <input type="checkbox" checked={newFTAmateur} onChange={function(e) { setNewFTAmateur(e.target.checked); }} />Amateur
                </label>
                <button onClick={function() { if (newFT.trim()) { addFT(newFT.trim(), newFTAmateur); setNewFT(""); setNewFTAmateur(false); } }} style={{ background: "#2d5a3d", color: "#fff", border: "none", borderRadius: 8, padding: "8px 16px", fontSize: 13, fontWeight: 600, cursor: "pointer", ...SF }}>Add</button>
              </div>
            </div>
          </div>
        )}

        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(480px,1fr))", gap: 24 }}>
          {majors.map(function(m) {
            const mg = gamesFor(m.id);
            return (
              <div key={m.id} style={{ background: "#fff", border: "1px solid #ddd", borderRadius: 12, padding: 24 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                  <div><div style={{ fontSize: 20, fontWeight: 700 }}>{m.name}</div><div style={{ fontSize: 14, color: "#777", marginTop: 2, ...SF }}>{m.venue}</div></div>
                  <button onClick={function() { startSetup(m.id); }} style={{ background: "#2d5a3d", color: "#fff", border: "none", borderRadius: 8, padding: "8px 18px", fontSize: 13, fontWeight: 600, cursor: "pointer", ...SF }}>+ New Game</button>
                </div>
                <div style={{ marginTop: 14 }}>
                  {mg.length === 0 ? <div style={{ color: "#aaa", fontSize: 14, ...SF }}>No games started</div> :
                    mg.map(function(g) {
                      return (
                        <div key={g.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: delId === g.id ? "#fef2f2" : "#f8f8f6", borderRadius: 8, padding: "10px 16px", marginTop: 8, ...SF }}>
                          <span style={{ fontSize: 14, fontWeight: 500, cursor: "pointer", flex: 1 }} onClick={function() { if (delId !== g.id) { setCurId(g.id); setView(g.draftComplete ? "scoreboard" : "draft"); } }}>{g.users.join(", ")}</span>
                          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                            {delId === g.id ? (
                              <>
                                <span style={{ fontSize: 12, color: "#c0392b", fontWeight: 600 }}>Delete?</span>
                                <button onClick={function() { setGames(function(p) { const n = { ...p }; delete n[g.id]; return n; }); setDelId(null); }} style={{ background: "#c0392b", color: "#fff", border: "none", borderRadius: 6, padding: "4px 12px", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>Yes</button>
                                <button onClick={function() { setDelId(null); }} style={{ background: "#eee", color: "#333", border: "none", borderRadius: 6, padding: "4px 12px", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>No</button>
                              </>
                            ) : (
                              <>
                                <span style={{ fontSize: 12, fontWeight: 600, background: g.draftComplete ? "#e8f0ea" : "#fef3cd", color: g.draftComplete ? "#2d5a3d" : "#856404", padding: "3px 12px", borderRadius: 12 }}>{g.draftComplete ? "Complete" : "Drafting"}</span>
                                <button onClick={function(e) { e.stopPropagation(); setDelId(g.id); }} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 16, color: "#ccc", padding: "2px 6px" }}>✕</button>
                              </>
                            )}
                          </div>
                        </div>
                      );
                    })}
                </div>
              </div>
            );
          })}
        </div>
      </Shell>
    );
  }

  // ─── SETUP ───────────────────────────────────────────────────────
  if (view === "setup") {
    const major = majors.find(function(m) { return m.id === setupMajor; });
    return (
      <Shell showBack onGoHome={goHome}>
        <div style={{ maxWidth: 560, margin: "0 auto" }}>
          <div style={{ background: "#fff", border: "1px solid #ddd", borderRadius: 12, padding: 36 }}>
            <h2 style={{ margin: "0 0 4px", fontSize: 24, fontWeight: 700 }}>{major?.name} {year}</h2>
            <p style={{ color: "#777", fontSize: 14, margin: "0 0 20px", ...SF }}>{major?.venue}</p>
            {setupStep === "count" ? (
              <>
                <div style={{ fontWeight: 700, fontSize: 16, marginBottom: 16, ...SF }}>How many users are playing?</div>
                <div style={{ display: "flex", alignItems: "center", marginBottom: 28 }}>
                  <button onClick={function() { setNumUsers(Math.max(2, numUsers - 1)); }} style={{ width: 44, height: 44, fontSize: 20, border: "1px solid #ccc", borderRadius: "8px 0 0 8px", background: "#f5f5f0", cursor: "pointer", fontWeight: 700, ...SF }}>−</button>
                  <div style={{ width: 52, height: 44, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, fontWeight: 700, borderTop: "1px solid #ccc", borderBottom: "1px solid #ccc", ...SF }}>{numUsers}</div>
                  <button onClick={function() { setNumUsers(Math.min(6, numUsers + 1)); }} style={{ width: 44, height: 44, fontSize: 20, border: "1px solid #ccc", borderRadius: "0 8px 8px 0", background: "#f5f5f0", cursor: "pointer", fontWeight: 700, ...SF }}>+</button>
                </div>
                <button onClick={function() { setNames(Array.from({ length: numUsers }, function() { return ""; })); setSetupStep("names"); }} style={{ width: "100%", padding: "14px", fontSize: 16, fontWeight: 700, background: "#2d5a3d", color: "#fff", border: "none", borderRadius: 10, cursor: "pointer", ...SF }}>Next: Enter Names</button>
              </>
            ) : (
              <>
                <div style={{ fontWeight: 700, fontSize: 16, marginBottom: 16, ...SF }}>Enter player names</div>
                {Array.from({ length: numUsers }).map(function(_, i) {
                  return (
                    <div key={"nm-" + i} style={{ marginBottom: 14 }}>
                      <label style={{ fontSize: 13, color: "#777", display: "block", marginBottom: 4, fontWeight: 600, ...SF }}>Player {i + 1}</label>
                      <input value={names[i] || ""} onChange={function(e) { const v = e.target.value; setNames(function(p) { const n = [...p]; n[i] = v; return n; }); }} placeholder={"Player " + (i + 1)} style={{ width: "100%", padding: "10px 14px", borderRadius: 8, border: "1px solid #ccc", fontSize: 14, boxSizing: "border-box", ...SF }} />
                    </div>
                  );
                })}
                <div style={{ display: "flex", gap: 10, marginTop: 20 }}>
                  <button onClick={function() { setSetupStep("count"); }} style={{ flex: 1, padding: "14px", fontSize: 15, fontWeight: 600, background: "#f5f5f0", border: "1px solid #ccc", borderRadius: 10, cursor: "pointer", ...SF }}>Back</button>
                  <button onClick={createGame} disabled={names.slice(0, numUsers).some(function(n) { return !n.trim(); })} style={{ flex: 2, padding: "14px", fontSize: 16, fontWeight: 700, background: "#2d5a3d", color: "#fff", border: "none", borderRadius: 10, cursor: "pointer", opacity: names.slice(0, numUsers).some(function(n) { return !n.trim(); }) ? 0.5 : 1, ...SF }}>Start Draft</button>
                </div>
              </>
            )}
          </div>
        </div>
      </Shell>
    );
  }

  // ─── DRAFT ───────────────────────────────────────────────────────
  if (view === "draft" && game) {
    const step = game.draftOrder[game.draftIndex];
    const picked = pickedSet();
    const ui = step?.user;
    const uname = game.users[ui];
    const isAlt = step?.type === "alt";
    const uPicks = game.picks[ui] || {};
    const uAlts = game.altPicks[ui] || {};
    const avail = isAlt ? ALT_CATS.filter(function(c) { return !Object.keys(uAlts).includes(c.id); }) : CATS.filter(function(c) { return !Object.keys(uPicks).includes(c.id); });
    const pickNum = isAlt ? (Object.keys(uAlts).length + 1) : (Object.keys(uPicks).length + 1);
    const pickTotal = isAlt ? 2 : 5;

    return (
      <Shell showBack onGoHome={goHome}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 28, flexWrap: "wrap", gap: 12 }}>
          <h2 style={{ margin: 0, fontSize: 24, fontWeight: 700 }}>{game.major.name} {game.year} — Draft</h2>
          <button onClick={resetDraft} style={{ background: "#e74c3c", color: "#fff", border: "none", borderRadius: 8, padding: "8px 20px", fontSize: 14, fontWeight: 600, cursor: "pointer", ...SF }}>Reset Draft</button>
        </div>
        {game.draftComplete ? (
          <div style={{ background: "#fff", border: "1px solid #ddd", borderRadius: 12, padding: 48, textAlign: "center" }}>
            <div style={{ fontSize: 48, marginBottom: 12 }}>🏌️</div>
            <h3 style={{ fontSize: 24, fontWeight: 700, color: "#2d5a3d", margin: "0 0 20px" }}>Draft Complete!</h3>
            <div style={{ display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap", ...SF }}>
              <button onClick={function() { setView("scoreboard"); }} style={{ background: "#2d5a3d", color: "#fff", border: "none", borderRadius: 8, padding: "12px 28px", fontSize: 15, fontWeight: 600, cursor: "pointer" }}>View Scoreboard</button>
              <button onClick={shareGame} style={{ background: "#fff", color: "#333", border: "1px solid #ccc", borderRadius: 8, padding: "12px 28px", fontSize: 15, fontWeight: 600, cursor: "pointer" }}>Share Game Link</button>
            </div>
            {shareMsg && <p style={{ color: "#2d5a3d", marginTop: 12, fontSize: 13, ...SF }}>{shareMsg}</p>}
          </div>
        ) : (
          <>
            <div style={{ background: "#fff", border: "1px solid #ddd", borderRadius: 12, padding: "18px 24px", marginBottom: 20 }}>
              <span style={{ color: "#2d5a3d", fontWeight: 700, fontSize: 18 }}>{uname}</span>
              <span style={{ fontSize: 16, ...SF }}> — Pick {pickNum} of {pickTotal}{isAlt ? " (Alternate)" : ""}</span>
              <div style={{ color: "#999", fontSize: 13, marginTop: 4, ...SF }}>Select a category and player below</div>
            </div>
            {avail.map(function(cat) {
              const poolRaw = isAlt ? pools.all.filter(function(p) { return !picked.has(p); }) : (cat.pool || []).filter(function(p) { return !picked.has(p); });
              const pool = [...poolRaw].sort(function(a, b) { return (pools.info[a]?.rank || 999) - (pools.info[b]?.rank || 999); });
              return (
                <div key={cat.id} style={{ background: "#fff", border: "1px solid #ddd", borderRadius: 12, padding: "18px 24px", marginBottom: 12, display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12 }}>
                  <div style={{ flex: 1, minWidth: 200 }}>
                    <div style={{ fontSize: 16, fontWeight: 700, ...SF }}>{cat.label}</div>
                    {cat.desc && <div style={{ fontSize: 13, color: "#888", marginTop: 2, ...SF }}>{cat.desc}</div>}
                  </div>
                  <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                    <select value={draftSel[cat.id] || ""} onChange={function(e) { setDraftSel(function(p) { return { ...p, [cat.id]: e.target.value }; }); }} style={{ padding: "8px 12px", borderRadius: 8, border: "1px solid #ccc", fontSize: 14, minWidth: 180, cursor: "pointer", ...SF }}>
                      <option value="">Select player...</option>
                      {pool.map(function(p) { return <option key={p} value={p}>{pLabel(p)}</option>; })}
                    </select>
                    <button onClick={function() { if (draftSel[cat.id]) makePick(draftSel[cat.id], cat.id); }} disabled={!draftSel[cat.id]} style={{ background: draftSel[cat.id] ? "#2d5a3d" : "#ccc", color: "#fff", border: "none", borderRadius: 8, padding: "8px 18px", fontSize: 14, fontWeight: 600, cursor: draftSel[cat.id] ? "pointer" : "not-allowed", ...SF }}>Pick</button>
                  </div>
                </div>
              );
            })}
            <h3 style={{ fontSize: 20, fontWeight: 700, marginTop: 32, marginBottom: 16 }}>Teams</h3>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(300px,1fr))", gap: 16 }}>
              {game.users.map(function(u, uIdx) {
                const pk = game.picks[uIdx] || {}; const al = game.altPicks[uIdx] || {};
                const has = Object.keys(pk).length > 0 || Object.keys(al).length > 0;
                return (
                  <div key={uIdx} style={{ background: "#fff", border: "1px solid #ddd", borderRadius: 12, padding: 20 }}>
                    <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 8 }}>{u}</div>
                    {!has ? <div style={{ color: "#aaa", fontSize: 14, ...SF }}>No picks yet</div> : (
                      <div style={{ ...SF }}>
                        {Object.entries(pk).map(function([cid, p]) { const ct = CATS.find(function(c) { return c.id === cid; }); return <div key={cid} style={{ fontSize: 13, padding: "3px 0", display: "flex", justifyContent: "space-between" }}><span>{p}</span><span style={{ color: "#999" }}>{ct?.label}</span></div>; })}
                        {Object.entries(al).map(function([aid, p]) { return <div key={aid} style={{ fontSize: 13, padding: "3px 0", color: "#b8860b" }}>{p} (alt)</div>; })}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </>
        )}
      </Shell>
    );
  }

  // ─── SCOREBOARD ──────────────────────────────────────────────────
  if (view === "scoreboard" && game) {
    const wt = winnerText();
    return (
      <Shell showBack onGoHome={goHome}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 24, flexWrap: "wrap", gap: 12 }}>
          <div>
            <h2 style={{ margin: 0, fontSize: 24, fontWeight: 700 }}>{game.major.name} {game.year} — Scoreboard</h2>
            <p style={{ color: "#777", fontSize: 14, margin: "4px 0 0", ...SF }}>{game.major.venue}</p>
          </div>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", ...SF }}>
            <button onClick={syncScores} disabled={scoreSyncing} style={{ background: "#2d5a3d", color: "#fff", border: "none", borderRadius: 8, padding: "8px 18px", fontSize: 13, fontWeight: 600, cursor: scoreSyncing ? "not-allowed" : "pointer", opacity: scoreSyncing ? 0.6 : 1 }}>{scoreSyncing ? "Syncing..." : "⚡ Sync Scores"}</button>
            <button onClick={function() { setShowScoreEdit(!showScoreEdit); }} style={{ background: "#fff", color: "#333", border: "1px solid #ccc", borderRadius: 8, padding: "8px 18px", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>Update Scores</button>
            <button onClick={shareGame} style={{ background: "#fff", color: "#333", border: "1px solid #ccc", borderRadius: 8, padding: "8px 18px", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>Share Link</button>
            <button onClick={function() { setView("draft"); }} style={{ background: "#fff", color: "#333", border: "1px solid #ccc", borderRadius: 8, padding: "8px 18px", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>View Draft</button>
            <button onClick={resetDraft} style={{ background: "#c0392b", color: "#fff", border: "none", borderRadius: 8, padding: "8px 18px", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>Reset</button>
          </div>
        </div>
        {shareMsg && <p style={{ color: "#2d5a3d", fontSize: 13, marginBottom: 8, textAlign: "right", ...SF }}>{shareMsg}</p>}
        {scoreSyncMsg && <p style={{ color: scoreSyncMsg.includes("✅") ? "#2d5a3d" : "#c0392b", fontSize: 13, marginBottom: 8, textAlign: "right", ...SF }}>{scoreSyncMsg}</p>}
        {wt && <div style={{ background: "#2d5a3d", color: "#fff", borderRadius: 12, padding: "16px 24px", textAlign: "center", fontSize: 18, fontWeight: 700, marginBottom: 24, ...SF }}>{wt}</div>}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(480px,1fr))", gap: 20 }}>
          {game.users.map(function(user, uIdx) {
            const pk = game.picks[uIdx] || {}; const al = game.altPicks[uIdx] || {};
            let tt = 0, cc = 0;
            Object.values(pk).forEach(function(p) { tt += game.scores[p]?.total || 0; if (game.cutStatus[p]) cc++; });
            const isW = winner?.i === uIdx;
            return (
              <div key={uIdx} style={{ background: "#fff", border: isW ? "2px solid #c9a836" : "1px solid #ddd", borderRadius: 12, position: "relative", overflow: "visible" }}>
                {isW && <div style={{ position: "absolute", top: -14, left: 20, background: "#2d5a3d", color: "#fff", padding: "4px 16px", borderRadius: 8, fontSize: 13, fontWeight: 700, ...SF }}>🏆 Winner</div>}
                <div style={{ padding: "24px 24px 0" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16 }}>
                    <div style={{ fontSize: 22, fontWeight: 700 }}>{user}</div>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ fontSize: 28, fontWeight: 700, color: isW ? "#c9a836" : "#2d5a3d", ...SF }}>{fmtScore(tt)}</div>
                      <div style={{ fontSize: 12, color: "#999", ...SF }}>{cc}/{Object.keys(pk).length} made cut</div>
                    </div>
                  </div>
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 14, ...SF }}>
                    <thead><tr style={{ borderBottom: "1px solid #eee" }}>
                      <th style={{ textAlign: "left", padding: "6px 4px", fontWeight: 600, fontSize: 12, color: "#999" }}>Player</th>
                      <th style={{ textAlign: "left", padding: "6px 4px", fontWeight: 600, fontSize: 12, color: "#999" }}>Category</th>
                      <th style={{ textAlign: "center", padding: "6px 4px", fontWeight: 600, fontSize: 12, color: "#999" }}>Score</th>
                      <th style={{ textAlign: "center", padding: "6px 4px", fontWeight: 600, fontSize: 12, color: "#999" }}>Cut</th>
                      <th style={{ textAlign: "right", padding: "6px 4px", fontWeight: 600, fontSize: 12, color: "#999" }}>Sub</th>
                    </tr></thead>
                    <tbody>
                      {CATS.map(function(cat) {
                        const player = pk[cat.id]; if (!player) return null;
                        const sc = game.scores[player]?.total || 0;
                        const cut = game.cutStatus[player] || false;
                        return (
                          <tr key={cat.id} style={{ borderBottom: "1px solid #f5f5f0" }}>
                            <td style={{ padding: "10px 4px", fontWeight: 600 }}>{player}</td>
                            <td style={{ padding: "10px 4px", color: "#888", fontSize: 13 }}>{cat.label}</td>
                            <td style={{ textAlign: "center", padding: "10px 4px", fontWeight: 600, color: sc < 0 ? "#2d5a3d" : sc > 0 ? "#c0392b" : "#333" }}>{fmtScore(sc)}</td>
                            <td style={{ textAlign: "center", padding: "10px 4px" }}>{cut ? <span style={{ color: "#2d5a3d", fontWeight: 700 }}>✓</span> : <span style={{ color: "#ccc" }}>—</span>}</td>
                            <td style={{ textAlign: "right", padding: "10px 4px" }}>
                              <select onChange={function(e) { if (e.target.value) swapPlayer(uIdx, cat.id, e.target.value); }} style={{ padding: "4px 8px", borderRadius: 6, border: "1px solid #ccc", background: "#e8f0ea", color: "#2d5a3d", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
                                <option value="">Swap</option>
                                {Object.entries(al).map(function([aid, p]) { return <option key={aid} value={aid}>↔ {p}</option>; })}
                              </select>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                  {Object.keys(al).length > 0 && (
                    <div style={{ marginTop: 14, paddingTop: 10, borderTop: "1px solid #eee", paddingBottom: 20 }}>
                      <div style={{ fontSize: 13, fontWeight: 700, color: "#999", marginBottom: 8 }}>Alternates <span style={{ fontWeight: 400 }}>(not counted in team score)</span></div>
                      {Object.entries(al).map(function([aid, player]) {
                        const sc = game.scores[player]?.total || 0;
                        const cut = game.cutStatus[player] || false;
                        return (
                          <div key={aid} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 4px", fontSize: 14 }}>
                            <span>{player}</span>
                            <div style={{ display: "flex", gap: 20, alignItems: "center" }}>
                              <span style={{ fontWeight: 600, color: sc < 0 ? "#2d5a3d" : sc > 0 ? "#c0392b" : "#333" }}>{fmtScore(sc)}</span>
                              <span>{cut ? <span style={{ color: "#2d5a3d", fontWeight: 700 }}>✓</span> : <span style={{ color: "#ccc" }}>—</span>}</span>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                  {Object.keys(al).length === 0 && <div style={{ paddingBottom: 20 }} />}
                </div>
              </div>
            );
          })}
        </div>
        {showScoreEdit && (
        <div style={{ marginTop: 32, background: "#fff", border: "1px solid #ddd", borderRadius: 12, padding: 24 }}>
          <h3 style={{ fontSize: 18, fontWeight: 700, marginTop: 0, marginBottom: 16 }}>Edit Scores & Status</h3>
          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 14, ...SF }}>
              <thead><tr style={{ borderBottom: "2px solid #eee" }}>
                <th style={{ textAlign: "left", padding: 8, fontWeight: 600, fontSize: 12, color: "#999" }}>Player</th>
                <th style={{ textAlign: "center", padding: 8, fontWeight: 600, fontSize: 12, color: "#999" }}>Score</th>
                <th style={{ textAlign: "center", padding: 8, fontWeight: 600, fontSize: 12, color: "#999" }}>Made Cut</th>
                <th style={{ textAlign: "center", padding: 8, fontWeight: 600, fontSize: 12, color: "#999" }}>Tournament Winner</th>
              </tr></thead>
              <tbody>
                {Object.keys(game.scores).sort().map(function(player) {
                  const sc = game.scores[player]?.total || 0;
                  const cut = game.cutStatus[player] || false;
                  const tw = game.scores[player]?.isWinner || false;
                  return (
                    <tr key={player} style={{ borderBottom: "1px solid #f5f5f0" }}>
                      <td style={{ padding: 8, fontWeight: 500 }}>{player}</td>
                      <td style={{ textAlign: "center", padding: 8 }}><input type="number" value={sc} onChange={function(e) { updScore(player, e.target.value); }} style={{ width: 70, textAlign: "center", padding: 6, borderRadius: 6, border: "1px solid #ccc", fontSize: 14, ...SF }} /></td>
                      <td style={{ textAlign: "center", padding: 8 }}><input type="checkbox" checked={cut} onChange={function() { togCut(player); }} style={{ cursor: "pointer", width: 18, height: 18 }} /></td>
                      <td style={{ textAlign: "center", padding: 8 }}><input type="radio" name={"tw-" + game.id} checked={tw} onChange={function() { markWinner(player); }} style={{ cursor: "pointer", width: 18, height: 18 }} /></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
        )}
        <div style={{ marginTop: 32, background: "#fff", border: "1px solid #ddd", borderRadius: 12, padding: 24, ...SF }}>
          <h3 style={{ fontSize: 18, fontWeight: 700, marginTop: 0, marginBottom: 12 }}>Winning Rules</h3>
          <div style={{ color: "#777", fontSize: 14, lineHeight: 1.7 }}>
            · Picking the tournament winner automatically wins the pick'em<br />
            · If no one picks the winner, the user with the most players making the 36-hole cut wins<br />
            · If users have the same number of players making the cut, lowest cumulative team score wins
          </div>
        </div>
      </Shell>
    );
  }

  return (
    <Shell onGoHome={goHome}>
      <div style={{ textAlign: "center", padding: 40 }}>
        <p>Something went wrong.</p>
        <button onClick={goHome} style={{ background: "#2d5a3d", color: "#fff", border: "none", borderRadius: 8, padding: "10px 24px", fontSize: 14, cursor: "pointer", ...SF }}>Go Home</button>
      </div>
    </Shell>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
