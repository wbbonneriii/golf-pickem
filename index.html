<html lang="en">

<meta charset="UTF-8">

<title>Major Pick'em – Golf Major Championship Draft</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  :root {
    --green-900:#1f3a2e;
    --green-800:#2e5140;
    --green-700:#3a6651;
    --green-600:#456f5a;
    --green-500:#5d8a74;
    --green-200:#cfddd2;
    --green-100:#e7efe9;
    --cream:#f5f3ee;
    --bg:#f2f2ef;
    --card:#ffffff;
    --border:#e3e3df;
    --text:#1b1b1b;
    --muted:#6b6b6b;
    --red:#c84a3e;
    --red-soft:#d95a4e;
    --gold:#c69b1a;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--text);
    background: var(--bg);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  h1,h2,h3,.serif { font-family: 'Playfair Display', serif; }
  button { font-family: inherit; cursor: pointer; }
  input, select { font-family: inherit; }
  a { color: inherit; }

  header.app-header {
    background: linear-gradient(180deg, #3d6450 0%, #2f4e3d 100%);
    color:#fff;
    padding: 20px 36px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .logo {
    display:flex;
    align-items:center;
    gap:12px;
  }
  .logo .flag { font-size: 34px; }
  .logo h1 { margin:0; font-size: 30px; font-weight: 800; letter-spacing: -0.5px; }
  .logo .sub { margin:0; font-size: 13px; opacity: 0.8; margin-top: -2px; }
  header.app-header .back { color:#fff; text-decoration: underline; font-size:14px; cursor:pointer; background:none; border:none; }

  main { padding: 32px 36px 64px; max-width: 1180px; margin: 0 auto; }

  .page-title {
    font-size: 30px;
    margin: 0 0 24px;
    font-weight: 700;
  }
  .page-header-row { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; margin-bottom: 24px; }
  .year-tabs { display:flex; background:#fff; border:1px solid var(--border); border-radius:10px; overflow:hidden; }
  .year-tabs button { background:none; border:none; padding: 8px 14px; font-size:14px; color:var(--text); font-weight:500; }
  .year-tabs button.active { background: var(--green-700); color:#fff; }
  .year-tabs button + button { border-left: 1px solid var(--border); }
  .year-tabs button.active + button { border-left: 1px solid var(--green-700); }

  .majors-grid {
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  @media (max-width: 780px) { .majors-grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px 24px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.02);
  }
  .major-card .top {
    display:flex; justify-content:space-between; align-items:flex-start; gap:10px;
  }
  .major-card h3 { margin:0 0 4px; font-size: 22px; }
  .major-card .venue { color: var(--muted); font-size: 14px; margin-bottom: 14px; }
  .btn {
    border:none;
    border-radius: 8px;
    padding: 9px 14px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    display:inline-flex;
    align-items:center;
    gap:6px;
    transition: transform .04s ease;
  }
  .btn:active { transform: translateY(1px); }
  .btn-primary { background: var(--green-700); color:#fff; }
  .btn-primary:hover { background: var(--green-800); }
  .btn-outline { background:#fff; border:1px solid var(--border); color:var(--text); }
  .btn-outline:hover { background: #fafaf7; }
  .btn-red { background: var(--red); color:#fff; }
  .btn-red:hover { background: var(--red-soft); }
  .btn-ghost { background: transparent; color:var(--text); border:1px solid var(--border); }
  .btn-small { padding: 6px 10px; font-size:13px; }
  .btn:disabled { opacity: 0.55; cursor: not-allowed; }

  .pill { display:inline-flex; align-items:center; padding: 4px 10px; background: var(--green-100); color: var(--green-800); border-radius: 20px; font-size: 12px; font-weight: 600; }
  .pill-muted { background: #efece6; color: #7a7a6f; }
  .pill-trophy { background: var(--green-700); color:#fff; }

  .game-row { margin-top:12px; display:flex; justify-content:space-between; align-items:center; padding: 10px 14px; background:#faf8f3; border-radius: 8px; border: 1px solid #eee6d6; }
  .game-row .names { font-weight: 600; }
  .game-row .status { display:flex; align-items:center; gap:10px; }
  .game-row .close { background:none; border:none; color:var(--muted); font-size:18px; cursor:pointer; }

  .centered-card { max-width: 580px; margin: 40px auto; padding: 28px 32px; }
  .centered-card h2 { font-size: 28px; margin: 0 0 4px; }
  .centered-card .subtitle { color: var(--muted); margin-bottom: 18px; }
  .centered-card label { display:block; font-weight:600; margin: 14px 0 6px; font-size: 14px; }
  .centered-card input[type=text] {
    width:100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
  }
  .centered-card input[type=text]:focus { outline: 2px solid var(--green-600); outline-offset: 0px; border-color: var(--green-600); }

  .counter { display:flex; align-items:center; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; width: fit-content; }
  .counter button { background:#fff; border:none; padding: 10px 16px; font-size: 20px; font-weight: 700; }
  .counter button:hover { background: #f3f3ef; }
  .counter .val { padding: 10px 20px; min-width: 40px; text-align:center; font-weight:700; font-size: 18px; border-left:1px solid var(--border); border-right:1px solid var(--border); }
  .counter button.focus { outline: 2px solid var(--green-600); outline-offset: -2px; }

  .row { display:flex; gap: 12px; margin-top: 18px; }
  .row .btn { flex:1; justify-content:center; padding: 12px; }

  /* Draft screen */
  .category-row {
    background:#fff;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap: 16px;
    margin-bottom: 10px;
  }
  .category-row .cat-title { font-weight: 700; font-size: 15px; }
  .category-row .cat-desc { color: var(--muted); font-size: 13px; margin-top: 2px; }
  .category-row select { padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; min-width: 220px; }
  .category-row .right { display:flex; gap: 8px; align-items:center; }

  .current-pick {
    background:#fff;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 22px;
    margin-bottom: 14px;
  }
  .current-pick h3 { margin: 0 0 2px; font-size: 20px; }
  .current-pick .sub { color: var(--muted); font-size: 13px; }

  /* Scoreboard */
  .board-grid { display:grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  @media (max-width: 900px) { .board-grid { grid-template-columns: 1fr; } }
  .team-card { background:#fff; border:1px solid var(--border); border-radius: 12px; padding: 18px 20px; position: relative; }
  .team-card.winner { border: 2px solid var(--gold); }
  .team-card .team-header {
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
  }
  .team-card h3 { font-size: 28px; margin: 0; font-family:'Playfair Display',serif; }
  .team-card .team-right { text-align:right; }
  .team-card .team-score { font-size: 28px; font-weight: 800; color: var(--gold); }
  .team-card .team-score.red { color: var(--red); }
  .team-card .team-score.green { color: var(--green-700); }
  .team-card .cut-count { color: var(--muted); font-size: 13px; margin-top: 2px; }
  .team-card .winner-pill {
    position:absolute; top:-12px; left:18px;
    background: var(--green-700); color:#fff; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 700;
  }

  table.picks {
    width:100%;
    border-collapse: collapse;
    margin-top: 10px;
  }
  table.picks th, table.picks td {
    text-align:left;
    padding: 8px 0;
    border-bottom: 1px solid #f1efe9;
    font-size: 14px;
    vertical-align: middle;
  }
  table.picks th { color: var(--muted); font-weight: 500; font-size: 12px; }
  table.picks td.num { text-align:right; font-weight: 700; }
  table.picks td.red { color: var(--red); }
  table.picks td.green { color: var(--green-700); }
  table.picks select { padding: 4px 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; background: #f5f4ef; }
  .alternates-label { margin-top: 10px; color: var(--muted); font-size: 12px; font-weight: 600; }
  .leader-banner {
    background: var(--green-800); color:#fff; text-align:center; padding: 14px; border-radius: 10px;
    margin-bottom: 16px; font-weight: 700; font-size: 15px;
  }
  .leader-banner .trophy { margin-right: 8px; }

  .actions-row { display:flex; gap: 8px; flex-wrap: wrap; }

  .success-toast { background: #e7efe9; color: var(--green-800); padding: 8px 14px; border-radius: 8px; font-size:13px; border:1px solid #cfe0d5; margin-bottom: 12px; display:none; }

  /* Admin */
  .admin-section { background:#fff; padding: 18px; border-radius:10px; border:1px solid var(--border); margin-bottom: 14px; }
  .admin-section h3 { margin-top:0; }
  textarea { width:100%; min-height: 180px; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-family: 'SF Mono', Menlo, monospace; font-size: 12px; }

  /* Share modal */
  .modal-backdrop { position: fixed; inset:0; background: rgba(0,0,0,0.4); display:flex; align-items:center; justify-content:center; z-index: 100; }
  .modal { background:#fff; border-radius:12px; padding: 24px; max-width: 620px; width: calc(100% - 40px); }
  .modal h3 { margin-top: 0; }
  .modal .link-box { display:flex; gap: 8px; }
  .modal .link-box input { flex:1; padding: 9px 10px; border: 1px solid var(--border); border-radius: 8px; font-size:13px; }

  .small-note { color: var(--muted); font-size: 12px; margin-top: 6px; }

  .ownership-badge { display:inline-block; background: var(--green-100); color: var(--green-800); border-radius: 4px; padding: 2px 6px; font-size: 11px; margin-left: 6px; font-weight: 600; }

  .flash { padding: 10px 14px; border-radius: 8px; margin-bottom: 12px; font-size: 14px; }
  .flash-info { background:#eaf1ec; border:1px solid #c8dbcf; color: var(--green-800); }
  .flash-warn { background:#fff4dd; border:1px solid #f0dba0; color:#7a5b0a; }
  .flash-error { background:#fde4e0; border:1px solid #e9b5ac; color:#8a2118; }

  .mini-tag { font-size: 11px; color: var(--muted); margin-left: 6px; }
  .rank-badge { display:inline-block; background:#eef2ea; color: var(--green-800); border-radius: 4px; padding: 1px 6px; font-size: 11px; font-weight: 700; margin-left: 6px; }

const LS_SETTINGS = "mpe_settings_v1";
const LS_GAMES = "mpe_games_v1";

// ------------------------- STATE -------------------------------------------
let state = {

  activeGameId: null,
  settings: loadSettings(),
  games: loadGames(),
  tempNewGame: null, // { majorId, year, userCount, usernames[], field[] }

function loadSettings() {
  try {
    const raw = localStorage.getItem(LS_SETTINGS);
    if (raw) return JSON.parse(raw);
  } catch(e){}
  return {
    majors: DEFAULT_MAJORS,
    owgrTop: DEFAULT_OWGR_TOP,
    majorWinners: DEFAULT_MAJOR_WINNERS,
    international: DEFAULT_INTERNATIONAL
  };
}
function saveSettings() {
  localStorage.setItem(LS_SETTINGS, JSON.stringify(state.settings));
}
function loadGames() {
  try {
    const raw = localStorage.getItem(LS_GAMES);
    if (raw) return JSON.parse(raw);
  } catch(e){}
  return {};
}
function saveGames() {
  localStorage.setItem(LS_GAMES, JSON.stringify(state.games));
}

// ------------------------- ROUTING -----------------------------------------
// Supported URL patterns:
//   #/                      → home
//   #/g/<base64json>        → shared game snapshot (read-only initial)
//   #/admin                 → admin page
function parseHash() {
  const hash = location.hash || "";
  if (hash.startsWith("#/g/")) {
    const payload = hash.substring(4);
    try {
      const json = decodeURIComponent(escape(atob(payload.replace(/-/g,'+').replace(/_/g,'/'))));
      const game = JSON.parse(json);
      // Import into games dict and go to scoreboard
      state.games[game.id] = game;
      saveGames();
      state.activeGameId = game.id;
      state.screen = "scoreboard";
      return true;
    } catch(e) {
      console.error("Failed to parse shared game", e);
    }
  } else if (hash === "#/admin") {
    state.screen = "admin";
    return true;
  }
  return false;
}
window.addEventListener("hashchange", () => { parseHash(); render(); });

const MAJOR_ORDER = ["masters","pga","usopen","open"];
const YEARS = [2024,2025,2026,2027,2028];
const CATEGORIES = [
  { id: "top10a", title: "Top 10 Pick #1", desc: "A player in the Top 10 of the official world golf rankings" },
  { id: "top10b", title: "Top 10 Pick #2", desc: "A player in the Top 10 of the official world golf rankings" },
  { id: "intl",   title: "International", desc: "An international born player not in the Top 10 of the world ranking" },
  { id: "nowin",  title: "No Major Wins", desc: "A player that has never won a major" },
  { id: "firsttimer", title: "First Timer", desc: "A player playing this major for the very first time" }
];

function el(html) {
  const div = document.createElement("div");
  div.innerHTML = html.trim();
  return div.firstChild;
}
function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}
function shortId() {
  return Math.random().toString(36).slice(2,8) + Date.now().toString(36).slice(-3);
}

function activeGame() { return state.games[state.activeGameId] || null; }

function rankOf(playerName) {
  const i = state.settings.owgrTop.findIndex(p => p.toLowerCase() === String(playerName).toLowerCase());
  return i >= 0 ? (i+1) : null;
}

function isTop10(p) { return rankOf(p) !== null && rankOf(p) <= 10; }
function isInternational(p, countryCode) {
  if (countryCode && countryCode.toUpperCase() !== "USA" && countryCode.toUpperCase() !== "US") return true;
  return state.settings.international.map(x=>x.toLowerCase()).includes(String(p).toLowerCase());
}
function hasWonMajor(p) {
  return state.settings.majorWinners.map(x=>x.toLowerCase()).includes(String(p).toLowerCase());
}

// ------------------------- ESPN API ----------------------------------------
// Public endpoint: https://site.api.espn.com/apis/site/v2/sports/golf/<league>/leaderboard
// Works from browser (CORS-friendly). Returns leaderboard with current scores and cut status.

async function fetchEspnLeaderboard(leagueSlug) {
  const url = `https://site.api.espn.com/apis/site/v2/sports/golf/${leagueSlug}/leaderboard`;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error("HTTP "+res.status);
    const data = await res.json();
    return parseEspnLeaderboard(data);
  } catch (e) {
    console.error("ESPN fetch failed", e);
    return null;
  }
}
function parseEspnLeaderboard(data) {
  try {
    const event = (data.events && data.events[0]) || null;
    if (!event) return null;
    const comp = event.competitions && event.competitions[0];
    if (!comp) return null;
    const statusName = (comp.status && comp.status.type && comp.status.type.name) || "";
    const completed = !!(comp.status && comp.status.type && comp.status.type.completed);
    const players = (comp.competitors || []).map(c => {
      const athlete = c.athlete || {};
      const name = athlete.displayName || (athlete.firstName + " " + athlete.lastName);
      const country = (athlete.flag && athlete.flag.alt) || (athlete.birthPlace && athlete.birthPlace.country) || "";
      const score = c.score ? parseScoreValue(c.score) : 0;
      const status = (c.status && c.status.type && c.status.type.name) || "";
      const madeCut = inferMadeCut(c);
      return {
        name,
        country,
        score,
        displayScore: c.score || "E",
        madeCut,
        position: c.status && c.status.position && c.status.position.displayName || (c.statistics && "") || "",
        status,
        withdrawn: status.toUpperCase().includes("WD") || status.toUpperCase().includes("DQ")
      };
    });
    return {
      eventName: event.name,
      eventShortName: event.shortName,
      date: event.date,
      statusName,
      completed,
      players
    };
  } catch (e) {
    console.error("Parse ESPN failed", e);
    return null;
  }
}
function parseScoreValue(v) {
  if (v === null || v === undefined) return 0;
  const s = String(v).trim();
  if (s === "" || s === "E") return 0;
  const n = Number(s);
  return isNaN(n) ? 0 : n;
}
function inferMadeCut(c) {
  const s = (c.status && c.status.type && c.status.type.name) || "";
  const desc = (c.status && c.status.type && c.status.type.description) || "";
  const up = (s + " " + desc).toUpperCase();
  if (up.includes("CUT") || up.includes("WD") || up.includes("DQ")) return false;
  // If the tournament hasn't reached the cut yet, default to null (unknown)
  return true;
}

// ------------------------- RENDER ------------------------------------------
function render() {
  const root = document.getElementById("app");
  root.innerHTML = "";
  root.appendChild(renderHeader());
  const main = document.createElement("main");
  root.appendChild(main);

  if (state.screen === "home") main.appendChild(renderHome());
  else if (state.screen === "newGameUsers") main.appendChild(renderNewGameUsers());
  else if (state.screen === "newGameNames") main.appendChild(renderNewGameNames());
  else if (state.screen === "draft") main.appendChild(renderDraft());
  else if (state.screen === "alternates") main.appendChild(renderAlternates());
  else if (state.screen === "scoreboard") main.appendChild(renderScoreboard());
  else if (state.screen === "admin") main.appendChild(renderAdmin());
}

function renderHeader() {
  const showBack = state.screen !== "home";
  const h = el(`
    <header class="app-header">
      <div class="logo">
        <div class="flag">⛳</div>
        <div>
          <h1>Major Pick'em</h1>
          <p class="sub">Golf Major Championship Draft</p>
        </div>
      </div>
      <div></div>
    </header>
  `);
  if (showBack) {
    const back = el(`<button class="back">← Back to Tournaments</button>`);
    back.onclick = () => { state.screen = "home"; location.hash = "#/"; render(); };
    h.querySelector("div:last-child").appendChild(back);
  }
  return h;
}

function renderHome() {
  const wrap = document.createElement("div");

  const header = el(`<div class="page-header-row"></div>`);
  header.appendChild(el(`<h2 class="page-title">${state.year} Men's Golf Majors</h2>`));

  const tabs = el(`<div style="display:flex; gap:10px; align-items:center;"></div>`);
  const yearTabs = el(`<div class="year-tabs"></div>`);
  YEARS.forEach(y => {
    const b = el(`<button class="${y===state.year?'active':''}">${y}</button>`);
    b.onclick = () => { state.year = y; render(); };
    yearTabs.appendChild(b);
  });
  tabs.appendChild(yearTabs);
  const admin = el(`<button class="btn btn-outline">⚙ Admin</button>`);
  admin.onclick = () => { state.screen = "admin"; location.hash = "#/admin"; render(); };
  tabs.appendChild(admin);
  header.appendChild(tabs);
  wrap.appendChild(header);

  const grid = el(`<div class="majors-grid"></div>`);
  MAJOR_ORDER.forEach(mid => {
    const m = state.settings.majors[mid];
    const venue = m.venues[state.year] || "TBD";
    const card = el(`
      <div class="card major-card">
        <div class="top">
          <div>
            <h3>${esc(m.name)}</h3>
            <div class="venue">${esc(venue)}</div>
          </div>
          <button class="btn btn-primary">+ New Game</button>
        </div>
        <div class="games-list"></div>
      </div>
    `);
    card.querySelector(".btn-primary").onclick = () => startNewGame(mid, state.year);

    const list = card.querySelector(".games-list");
    const existing = Object.values(state.games).filter(g => g.majorId===mid && g.year===state.year);
    if (existing.length === 0) {
      list.appendChild(el(`<div class="venue" style="margin-top:12px">No games started</div>`));
    } else {
      existing.forEach(g => {
        const row = el(`
          <div class="game-row">
            <div class="names">${g.users.map(u=>esc(u.name)).join(", ")}</div>
            <div class="status">
              <span class="pill ${g.phase==='complete'?'pill':'pill-muted'}">${g.phase==='scoreboard'?'Complete':g.phase==='draft'?'Drafting':'Setup'}</span>
              <button class="close" title="Delete">×</button>
            </div>
          </div>
        `);
        row.onclick = (e) => {
          if (e.target.classList.contains("close")) {
            if (confirm("Delete this game?")) {
              delete state.games[g.id];
              saveGames();
              render();
            }
          } else {
            state.activeGameId = g.id;
            state.screen = g.phase === "scoreboard" ? "scoreboard" : (g.phase === "draft" ? "draft" : (g.phase === "alternates" ? "alternates" : "scoreboard"));
            render();
          }
        };
        list.appendChild(row);
      });
    }
    grid.appendChild(card);
  });

  wrap.appendChild(grid);
  return wrap;
}

function startNewGame(majorId, year) {
  state.tempNewGame = { majorId, year, userCount: 2, usernames: [] };
  state.screen = "newGameUsers";
  render();
}

function renderNewGameUsers() {
  const m = state.settings.majors[state.tempNewGame.majorId];
  const venue = m.venues[state.tempNewGame.year] || "TBD";
  const card = el(`
    <div class="card centered-card">
      <h2>${esc(m.name)} ${state.tempNewGame.year}</h2>
      <div class="subtitle">${esc(venue)}</div>
      <h3 style="font-family:Inter,sans-serif;font-size:18px;">How many users are playing?</h3>
      <div class="counter">
        <button id="dec">−</button>
        <div class="val" id="val">${state.tempNewGame.userCount}</div>
        <button id="inc" class="focus">+</button>
      </div>
      <div class="row">
        <button class="btn btn-primary" id="next">Next: Enter Names</button>
      </div>
    </div>
  `);
  card.querySelector("#dec").onclick = () => {
    if (state.tempNewGame.userCount > 1) { state.tempNewGame.userCount--; render(); }
  };
  card.querySelector("#inc").onclick = () => {
    if (state.tempNewGame.userCount < 10) { state.tempNewGame.userCount++; render(); }
  };
  card.querySelector("#next").onclick = () => {
    state.tempNewGame.usernames = Array.from({length: state.tempNewGame.userCount}, (_,i) => state.tempNewGame.usernames[i] || "");
    state.screen = "newGameNames";
    render();
  };
  return card;
}

function renderNewGameNames() {
  const m = state.settings.majors[state.tempNewGame.majorId];
  const venue = m.venues[state.tempNewGame.year] || "TBD";
  const card = el(`
    <div class="card centered-card">
      <h2>${esc(m.name)} ${state.tempNewGame.year}</h2>
      <div class="subtitle">${esc(venue)}</div>
      <h3 style="font-family:Inter,sans-serif;font-size:16px;margin-bottom:8px;">Enter player names</h3>
      <div id="inputs"></div>
      <div class="row">
        <button class="btn btn-outline" id="back">Back</button>
        <button class="btn btn-primary" id="start">Start Draft</button>
      </div>
    </div>
  `);
  const inputs = card.querySelector("#inputs");
  for (let i=0; i<state.tempNewGame.userCount; i++) {
    const grp = el(`
      <div>
        <label>Player ${i+1}</label>
        <input type="text" placeholder="Player ${i+1}" value="${esc(state.tempNewGame.usernames[i]||'')}">
      </div>
    `);
    const inp = grp.querySelector("input");
    inp.addEventListener("input", () => state.tempNewGame.usernames[i] = inp.value);
    inputs.appendChild(grp);
  }
  card.querySelector("#back").onclick = () => { state.screen = "newGameUsers"; render(); };
  card.querySelector("#start").onclick = async () => {
    // Validate names
    const names = state.tempNewGame.usernames.map(n => (n||"").trim());
    if (names.some(n => !n)) { alert("Please enter a name for every player"); return; }
    // Fetch ESPN field (best-effort)
    const btn = card.querySelector("#start");
    btn.disabled = true; btn.textContent = "Loading field...";
    const lb = await fetchEspnLeaderboard(state.settings.majors[state.tempNewGame.majorId].espnLeague);
    // Build field
    const field = (lb && lb.players && lb.players.length ? lb.players.map(p=>({name:p.name,country:p.country,score:p.score,displayScore:p.displayScore,madeCut:p.madeCut,withdrawn:p.withdrawn})) : []);
    // Create game
    const gameId = shortId();
    const game = {
      id: gameId,
      version: 1,
      majorId: state.tempNewGame.majorId,
      year: state.tempNewGame.year,
      phase: "draft",
      createdAt: new Date().toISOString(),
      users: names.map((n, idx) => ({ id:"u"+(idx+1), name: n, picks:{}, alternates: [] })),
      draftOrder: [], // array of user indices
      currentPickIdx: 0,
      field, // ESPN players (may be empty)
      firstTimers: [], // set via admin for best accuracy
      liveSync: lb ? { source: "espn", fetchedAt: new Date().toISOString(), status: lb.statusName, completed: lb.completed } : null,
      customPlayers: [] // user-added players
    };
    // Build snake draft order
    const U = names.length;
    const order = [];
    for (let r=0; r<5; r++) {
      const seq = (r%2===0) ? [...Array(U).keys()] : [...Array(U).keys()].reverse();
      seq.forEach(i => order.push(i));
    }
    game.draftOrder = order;
    state.games[gameId] = game;
    saveGames();
    state.activeGameId = gameId;
    state.screen = "draft";
    state.tempNewGame = null;
    render();
  };
  return card;
}

// --- Player pool filtering ---
function allPlayers(g) {
  // Union of ESPN field, OWGR top, known internationals, major winners, customs.
  const set = new Map();
  (g.field || []).forEach(p => set.set(p.name.toLowerCase(), {name:p.name, country:p.country, source:"espn", score:p.score, madeCut:p.madeCut, displayScore:p.displayScore, withdrawn:p.withdrawn}));
  state.settings.owgrTop.forEach(n => { if (!set.has(n.toLowerCase())) set.set(n.toLowerCase(), {name:n, country:"", source:"owgr"}); });
  state.settings.international.forEach(n => { if (!set.has(n.toLowerCase())) set.set(n.toLowerCase(), {name:n, country:"intl", source:"intl"}); });
  (g.customPlayers||[]).forEach(n => { if (!set.has(n.toLowerCase())) set.set(n.toLowerCase(), {name:n, country:"", source:"custom"}); });
  return Array.from(set.values());
}

function eligibleForCategory(g, catId) {
  const all = allPlayers(g);
  let eligible;
  if (catId === "top10a" || catId === "top10b") {
    eligible = state.settings.owgrTop.slice(0,10).map(n => all.find(p=>p.name.toLowerCase()===n.toLowerCase()) || {name:n});
  } else if (catId === "intl") {
    eligible = all.filter(p => !isTop10(p.name) && isInternational(p.name, p.country));
  } else if (catId === "nowin") {
    eligible = all.filter(p => !hasWonMajor(p.name));
  } else if (catId === "firsttimer") {
    // If firstTimers list populated, use it. Otherwise, fall back to full field.
    if (g.firstTimers && g.firstTimers.length) {
      eligible = g.firstTimers.map(n => all.find(p=>p.name.toLowerCase()===n.toLowerCase()) || {name:n});
    } else {
      eligible = all.slice(); // allow any
    }
  } else eligible = all;
  // Remove already-picked players from this game
  const picked = new Set();
  g.users.forEach(u => {
    Object.values(u.picks||{}).forEach(v => { if (v) picked.add(v.toLowerCase()); });
    (u.alternates||[]).forEach(v => { if (v) picked.add(v.toLowerCase()); });
  });
  eligible = eligible.filter(p => p && p.name && !picked.has(p.name.toLowerCase()));
  // Dedup by name and sort by OWGR rank (unranked players alphabetical at the end).
  const seen = new Set();
  eligible = eligible.filter(p => { const k=p.name.toLowerCase(); if (seen.has(k)) return false; seen.add(k); return true; });
  eligible.sort((a,b)=>{
    const ra = rankOf(a.name), rb = rankOf(b.name);
    if (ra !== null && rb !== null) return ra - rb;   // both ranked → by rank
    if (ra !== null) return -1;                        // ranked first
    if (rb !== null) return 1;
    return a.name.localeCompare(b.name);               // both unranked → alphabetical
  });
  return eligible;
}

function renderDraft() {
  const g = activeGame();
  if (!g) { state.screen="home"; render(); return document.createElement("div"); }
  const m = state.settings.majors[g.majorId];

  const wrap = document.createElement("div");
  wrap.appendChild(el(`
    <div class="page-header-row">
      <h2 class="page-title">${esc(m.name)} ${g.year} — Draft</h2>
      <div class="actions-row">
        <button class="btn btn-outline" id="addPlayer">+ Add Player</button>
        <button class="btn btn-red" id="reset">Reset Draft</button>
      </div>
    </div>
  `));
  wrap.querySelector("#reset").onclick = () => {
    if (!confirm("Reset the draft? All picks will be cleared.")) return;
    g.users.forEach(u => { u.picks={}; u.alternates=[]; });
    g.currentPickIdx = 0;
    g.phase = "draft";
    saveGames(); render();
  };
  wrap.querySelector("#addPlayer").onclick = () => {
    const name = prompt("Add a custom player to the pool (e.g., a late commit):");
    if (name && name.trim()) { g.customPlayers = (g.customPlayers||[]).concat([name.trim()]); saveGames(); render(); }
  };

  // If no ESPN field was loaded, warn
  if (!g.field || g.field.length === 0) {
    wrap.appendChild(el(`<div class="flash flash-warn">Live field from ESPN could not be loaded (the tournament may not yet be scheduled in ESPN's feed, or the network blocked it). You can still draft using the OWGR Top 10, known internationals, and the "Add Player" button for any extra names.</div>`));
  }

  // Compute current picker
  if (g.currentPickIdx < g.draftOrder.length) {
    const userIdx = g.draftOrder[g.currentPickIdx];
    const user = g.users[userIdx];
    const pickNum = g.currentPickIdx + 1;
    wrap.appendChild(el(`
      <div class="current-pick">
        <h3>${esc(user.name)} — Pick ${pickNum} of ${g.draftOrder.length}</h3>
        <div class="sub">Select a category and player below</div>
      </div>
    `));
    // Categories
    CATEGORIES.forEach(cat => {
      const already = user.picks[cat.id];
      const eligible = eligibleForCategory(g, cat.id);
      const poolNote = already ? "" : `<span class="mini-tag">${eligible.length} available</span>`;
      const row = el(`
        <div class="category-row">
          <div>
            <div class="cat-title">${esc(cat.title)} ${poolNote}</div>
            <div class="cat-desc">${esc(cat.desc)}</div>
          </div>
          <div class="right">
            ${ already
                ? `<span class="pill">Picked: ${esc(already)}</span>`
                : `<select><option value="">Select player...</option>${eligible.map(p=>`<option value="${esc(p.name)}">${esc(p.name)}${rankOf(p.name)?` (#${rankOf(p.name)})`:''}</option>`).join("")}</select>
                   <button class="btn btn-outline btn-small pick-btn" disabled>Pick</button>`
            }
          </div>
        </div>
      `);
      if (!already) {
        const sel = row.querySelector("select");
        const btn = row.querySelector(".pick-btn");
        sel.onchange = () => { btn.disabled = !sel.value; };
        btn.onclick = () => {
          if (!sel.value) return;
          user.picks[cat.id] = sel.value;
          g.currentPickIdx++;
          if (g.currentPickIdx >= g.draftOrder.length) {
            g.phase = "alternates";
            state.screen = "alternates";
          }
          saveGames(); render();
        };
      }
      wrap.appendChild(row);
    });
  } else {
    // Draft done → move to alternates
    g.phase = "alternates";
    state.screen = "alternates";
    render();
    return document.createElement("div");
  }

  return wrap;
}

function renderAlternates() {
  const g = activeGame();
  if (!g) { state.screen="home"; render(); return document.createElement("div"); }
  const m = state.settings.majors[g.majorId];

  const wrap = document.createElement("div");
  wrap.appendChild(el(`
    <div class="page-header-row">
      <h2 class="page-title">${esc(m.name)} ${g.year} — Pick Alternates</h2>
      <div class="actions-row">
        <button class="btn btn-red" id="reset">Reset Draft</button>
      </div>
    </div>
  `));
  wrap.querySelector("#reset").onclick = () => {
    if (!confirm("Reset the draft? All picks will be cleared.")) return;
    g.users.forEach(u => { u.picks={}; u.alternates=[]; });
    g.currentPickIdx = 0;
    g.phase = "draft";
    state.screen = "draft";
    saveGames(); render();
  };
  wrap.appendChild(el(`<div class="flash flash-info">Each user now selects <b>two alternates</b> (not counted in team score, but swappable for a primary player).</div>`));

  g.users.forEach((u, idx) => {
    const box = el(`<div class="card" style="margin-bottom:12px"><h3 style="margin:0 0 4px; font-size:18px; font-family:Inter,sans-serif;">${esc(u.name)}</h3><div id="alts"></div></div>`);
    const alts = box.querySelector("#alts");
    for (let k=0; k<2; k++) {
      if (u.alternates[k]) {
        alts.appendChild(el(`<div class="category-row"><div class="cat-title">Alternate ${k+1}</div><div class="right"><span class="pill">Picked: ${esc(u.alternates[k])}</span></div></div>`));
      } else {
        // Show full available pool minus picked/alts
        const eligible = eligibleForCategory(g, "any_pool");
        const all = allPlayers(g).filter(p => {
          const pickedSet = new Set();
          g.users.forEach(uu => { Object.values(uu.picks||{}).forEach(v=>{ if (v) pickedSet.add(v.toLowerCase()); }); (uu.alternates||[]).forEach(v=>{ if (v) pickedSet.add(v.toLowerCase()); }); });
          return !pickedSet.has(p.name.toLowerCase());
        }).sort((a,b)=>a.name.localeCompare(b.name));
        const row = el(`
          <div class="category-row">
            <div class="cat-title">Alternate ${k+1}</div>
            <div class="right">
              <select><option value="">Select player...</option>${all.map(p=>`<option value="${esc(p.name)}">${esc(p.name)}${rankOf(p.name)?` (#${rankOf(p.name)})`:''}</option>`).join("")}</select>
              <button class="btn btn-outline btn-small pick-btn" disabled>Pick</button>
            </div>
          </div>
        `);
        const sel = row.querySelector("select");
        const btn = row.querySelector(".pick-btn");
        sel.onchange = () => { btn.disabled = !sel.value; };
        btn.onclick = () => {
          if (!sel.value) return;
          u.alternates[k] = sel.value;
          saveGames(); render();
        };
        alts.appendChild(row);
        break; // only show next empty slot
      }
    }
    wrap.appendChild(box);
  });

  // Check if all alternates selected → move to scoreboard
  const done = g.users.every(u => (u.alternates||[]).filter(a=>a).length === 2);
  const doneRow = el(`<div class="row"><button class="btn btn-primary" id="toBoard" ${done?'':'disabled'}>Go to Scoreboard</button></div>`);
  doneRow.querySelector("#toBoard").onclick = () => { g.phase="scoreboard"; state.screen="scoreboard"; saveGames(); render(); };
  wrap.appendChild(doneRow);
  return wrap;
}

function renderScoreboard() {
  const g = activeGame();
  if (!g) { state.screen="home"; render(); return document.createElement("div"); }
  const m = state.settings.majors[g.majorId];
  const wrap = document.createElement("div");

  wrap.appendChild(el(`
    <div class="page-header-row">
      <div>
        <h2 class="page-title" style="margin-bottom:2px">${esc(m.name)} ${g.year} — Scoreboard</h2>
        <div class="venue" style="color:var(--muted);font-size:14px">${esc(m.venues[g.year]||"")}</div>
      </div>
      <div class="actions-row">
        <button class="btn btn-primary" id="sync">+ Sync Scores</button>
        <button class="btn btn-outline" id="manual">Update Scores</button>
        <button class="btn btn-outline" id="share">Share Link</button>
        <button class="btn btn-outline" id="viewDraft">View Draft</button>
        <button class="btn btn-red" id="reset">Reset</button>
      </div>
    </div>
  `));
  if (state.toast) {
    wrap.appendChild(el(`<div class="flash flash-info">${esc(state.toast)}</div>`));
    setTimeout(()=>{ state.toast=null; }, 3000);
  }

  wrap.querySelector("#sync").onclick = async () => {
    const btn = wrap.querySelector("#sync");
    btn.disabled = true; btn.textContent = "Syncing...";
    const lb = await fetchEspnLeaderboard(m.espnLeague);
    if (!lb) { alert("Could not reach ESPN. Try the 'Update Scores' button to enter scores manually."); btn.disabled=false; btn.textContent="+ Sync Scores"; return; }
    applyLeaderboardToGame(g, lb);
    g.liveSync = { source:"espn", fetchedAt:new Date().toISOString(), status:lb.statusName, completed:lb.completed, eventName: lb.eventName };
    saveGames();
    state.toast = `${esc(lb.eventName||"Tournament")} scores synced · ${lb.players.length} players matched. Cut status updated.`;
    render();
  };
  wrap.querySelector("#manual").onclick = () => openManualScoresModal(g);
  wrap.querySelector("#share").onclick = () => openShareModal(g);
  wrap.querySelector("#viewDraft").onclick = () => {
    const summary = g.users.map(u => `${u.name}\n` + CATEGORIES.map(c=>`  ${c.title}: ${u.picks[c.id]||"—"}`).join("\n") + `\n  Alternates: ${(u.alternates||[]).join(", ")||"—"}`).join("\n\n");
    alert(summary);
  };
  wrap.querySelector("#reset").onclick = () => {
    if (!confirm("Reset this game's scores and cut marks? (Picks will be kept.)")) return;
    g.users.forEach(u => { (u.picks, u); });
    // clear scores on picks
    g.scores = {};
    g.cuts = {};
    saveGames(); render();
  };

  // Winner banner
  const winnerId = computeWinner(g);
  if (winnerId) {
    const u = g.users.find(x=>x.id===winnerId);
    const reason = winnerReason(g, winnerId);
    wrap.appendChild(el(`<div class="leader-banner"><span class="trophy">🏆</span>${esc(u.name)} wins — ${esc(reason)}</div>`));
  }

  // Teams grid
  const grid = el(`<div class="board-grid"></div>`);
  g.users.forEach(u => grid.appendChild(renderTeamCard(g, u, winnerId===u.id)));
  wrap.appendChild(grid);

  // Winning rules card
  wrap.appendChild(el(`
    <div class="card" style="margin-top:20px">
      <h3 style="margin:0 0 8px;font-size:18px;font-family:Inter,sans-serif;">Winning Rules</h3>
      <div style="color:var(--muted);font-size:14px;line-height:1.7">
        · Picking the tournament winner automatically wins the pick'em.<br>
        · If no one picks the winner, the user with the most players making the 36-hole cut wins.<br>
        · If users have the same number of players making the cut, lowest cumulative team score wins.
      </div>
    </div>
  `));

  return wrap;
}

function renderTeamCard(g, u, isWinner) {
  const scoreData = computeUserScore(g, u);
  const card = el(`<div class="team-card ${isWinner?'winner':''}"></div>`);
  if (isWinner) card.appendChild(el(`<div class="winner-pill">🏆 Winner</div>`));
  const scoreClass = scoreData.total < 0 ? "red" : (scoreData.total > 0 ? "green" : "");
  const scoreDisp = scoreData.total === 0 ? "E" : (scoreData.total > 0 ? `+${scoreData.total}` : `${scoreData.total}`);
  card.appendChild(el(`
    <div class="team-header">
      <h3>${esc(u.name)}</h3>
      <div class="team-right">
        <div class="team-score ${scoreClass}">${scoreDisp}</div>
        <div class="cut-count">${scoreData.madeCut}/5 made cut</div>
      </div>
    </div>
  `));

  const tbl = el(`<table class="picks"><thead><tr><th>Player</th><th>Category</th><th style="text-align:right">Score</th><th>Cut</th><th>Sub</th></tr></thead><tbody></tbody></table>`);
  const tbody = tbl.querySelector("tbody");
  CATEGORIES.forEach(cat => {
    const name = u.picks[cat.id] || "—";
    const sd = getPlayerScore(g, name);
    const scoreTxt = sd.score === null ? "—" : (sd.score === 0 ? "E" : (sd.score > 0 ? `+${sd.score}` : `${sd.score}`));
    const scoreCls = sd.score === null ? "" : (sd.score < 0 ? "red" : (sd.score > 0 ? "green" : ""));
    const cutTxt = sd.madeCut===true?"✓":(sd.madeCut===false?"—":"");
    const row = el(`
      <tr>
        <td><b>${esc(name)}</b></td>
        <td>${esc(cat.title)}</td>
        <td class="num ${scoreCls}">${scoreTxt}</td>
        <td>${cutTxt}</td>
        <td></td>
      </tr>
    `);
    const subCell = row.querySelector("td:last-child");
    if (name && name !== "—" && (u.alternates||[]).length) {
      const sel = el(`<select><option value="">Swap</option>${(u.alternates||[]).map(a=>`<option value="${esc(a)}">${esc(a)}</option>`).join("")}</select>`);
      sel.onchange = () => {
        const alt = sel.value;
        if (!alt) return;
        // Swap primary with alternate
        const altIdx = u.alternates.indexOf(alt);
        u.alternates[altIdx] = name;
        u.picks[cat.id] = alt;
        saveGames(); render();
      };
      subCell.appendChild(sel);
    }
    tbody.appendChild(row);
  });
  card.appendChild(tbl);

  // Alternates
  card.appendChild(el(`<div class="alternates-label">Alternates (not counted in team score)</div>`));
  const altTbl = el(`<table class="picks"><tbody></tbody></table>`);
  const altBody = altTbl.querySelector("tbody");
  (u.alternates||[]).forEach(a => {
    const sd = getPlayerScore(g, a);
    const scoreTxt = sd.score === null ? "—" : (sd.score === 0 ? "E" : (sd.score > 0 ? `+${sd.score}` : `${sd.score}`));
    const scoreCls = sd.score === null ? "" : (sd.score < 0 ? "red" : (sd.score > 0 ? "green" : ""));
    const cutTxt = sd.madeCut===true?"✓":(sd.madeCut===false?"—":"");
    altBody.appendChild(el(`<tr><td>${esc(a)}</td><td></td><td class="num ${scoreCls}">${scoreTxt}</td><td>${cutTxt}</td><td></td></tr>`));
  });
  card.appendChild(altTbl);

  return card;
}

function getPlayerScore(g, name) {
  if (!name) return { score: null, madeCut: null };
  const key = name.toLowerCase();
  if (g.scores && (key in g.scores)) {
    return { score: g.scores[key], madeCut: g.cuts ? g.cuts[key] : null };
  }
  // Search ESPN field cached in game
  const p = (g.field||[]).find(p => p.name.toLowerCase() === key);
  if (p) return { score: (p.score||0), madeCut: p.madeCut };
  return { score: null, madeCut: null };
}
function computeUserScore(g, u) {
  let total = 0; let madeCut = 0;
  CATEGORIES.forEach(cat => {
    const name = u.picks[cat.id];
    if (!name) return;
    const sd = getPlayerScore(g, name);
    if (sd.score !== null) total += sd.score;
    if (sd.madeCut === true) madeCut++;
  });
  return { total, madeCut };
}
function applyLeaderboardToGame(g, lb) {
  g.field = lb.players.map(p => ({name:p.name,country:p.country,score:p.score,displayScore:p.displayScore,madeCut:p.madeCut,withdrawn:p.withdrawn}));
  g.scores = g.scores || {};
  g.cuts = g.cuts || {};
  lb.players.forEach(p => {
    g.scores[p.name.toLowerCase()] = p.score || 0;
    g.cuts[p.name.toLowerCase()] = p.madeCut;
  });
  // Determine tournament winner if completed
  if (lb.completed) {
    const leader = lb.players.slice().sort((a,b)=> (a.score||0) - (b.score||0))[0];
    g.tournamentWinner = leader ? leader.name : null;
  } else {
    g.tournamentWinner = null;
  }
}
function computeWinner(g) {
  // Rule 1: any user picks the tournament winner
  if (g.tournamentWinner) {
    const tw = g.tournamentWinner.toLowerCase();
    for (const u of g.users) {
      const picks = Object.values(u.picks||{}).map(x=>String(x||"").toLowerCase());
      if (picks.includes(tw)) return u.id;
    }
  }
  // Only apply cut/score tiebreakers if we actually have scores or cuts populated
  const hasData = g.scores && Object.keys(g.scores).length > 0;
  if (!hasData) return null;
  // Rule 2: most made-cut players
  const results = g.users.map(u => ({ u, ...computeUserScore(g,u) }));
  const maxCut = Math.max(...results.map(r=>r.madeCut));
  const topCut = results.filter(r=>r.madeCut===maxCut);
  if (topCut.length === 1) return topCut[0].u.id;
  // Rule 3: lowest cumulative score
  const minScore = Math.min(...topCut.map(r=>r.total));
  const finalists = topCut.filter(r=>r.total===minScore);
  if (finalists.length === 1) return finalists[0].u.id;
  return null;
}
function winnerReason(g, userId) {
  if (g.tournamentWinner) {
    const tw = g.tournamentWinner.toLowerCase();
    const u = g.users.find(x=>x.id===userId);
    const picks = Object.values(u.picks||{}).map(x=>String(x||"").toLowerCase());
    if (picks.includes(tw)) return `Picked tournament winner: ${g.tournamentWinner}`;
  }
  const r = computeUserScore(g, g.users.find(x=>x.id===userId));
  return `Lowest cumulative score (${r.total===0?'E':(r.total>0?'+'+r.total:r.total)})`;
}

function openManualScoresModal(g) {
  const backdrop = el(`<div class="modal-backdrop"></div>`);
  const modal = el(`<div class="modal"><h3>Update Scores Manually</h3><p class="small-note">Enter to-par scores for each drafted player (e.g., -5, +2, 0). Check the box if they made the 36-hole cut.</p><div id="rows"></div><div class="row"><button class="btn btn-outline" id="cancel">Cancel</button><button class="btn btn-primary" id="save">Save</button></div></div>`);
  backdrop.appendChild(modal);
  const rows = modal.querySelector("#rows");
  const all = new Set();
  g.users.forEach(u => { Object.values(u.picks||{}).forEach(n=>n&&all.add(n)); (u.alternates||[]).forEach(n=>n&&all.add(n)); });
  Array.from(all).sort().forEach(name => {
    const sd = getPlayerScore(g, name);
    const row = el(`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;"><div style="flex:1">${esc(name)}</div><input type="text" style="width:70px;padding:6px;border:1px solid var(--border);border-radius:6px" value="${sd.score===null?'':sd.score}" placeholder="0"> <label style="font-size:13px"><input type="checkbox" ${sd.madeCut?'checked':''}> cut</label></div>`);
    row.dataset.name = name;
    rows.appendChild(row);
  });
  modal.querySelector("#cancel").onclick = () => backdrop.remove();
  modal.querySelector("#save").onclick = () => {
    g.scores = g.scores || {};
    g.cuts = g.cuts || {};
    rows.querySelectorAll("[data-name]").forEach(row => {
      const name = row.dataset.name.toLowerCase();
      const scr = row.querySelector("input[type=text]").value.trim();
      const cut = row.querySelector("input[type=checkbox]").checked;
      if (scr === "") delete g.scores[name]; else g.scores[name] = Number(scr)||0;
      g.cuts[name] = cut;
    });
    // Tournament winner: player with lowest score among madeCut
    const candidates = Object.keys(g.scores).filter(k => g.cuts[k]).map(k=>({name:k,score:g.scores[k]}));
    if (candidates.length) {
      candidates.sort((a,b)=>a.score-b.score);
      g.tournamentWinner = findOriginalName(g, candidates[0].name);
    }
    saveGames();
    backdrop.remove();
    state.toast = "Scores updated.";
    render();
  };
  document.body.appendChild(backdrop);
}
function findOriginalName(g, lowerName) {
  for (const u of g.users) {
    for (const v of Object.values(u.picks||{})) if (v && v.toLowerCase()===lowerName) return v;
    for (const v of (u.alternates||[])) if (v && v.toLowerCase()===lowerName) return v;
  }
  const p = (g.field||[]).find(p=>p.name.toLowerCase()===lowerName);
  return p ? p.name : lowerName;
}

function openShareModal(g) {
  // Encode minimal game snapshot → base64url → URL hash.
  const snapshot = JSON.parse(JSON.stringify(g));
  // We keep full field because users want live scoring view after opening the link;
  // the receiver's "Sync" button will refresh from ESPN if available.
  const json = JSON.stringify(snapshot);
  const b64 = btoa(unescape(encodeURIComponent(json))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
  const url = `${location.origin}${location.pathname}#/g/${b64}`;
  const backdrop = el(`<div class="modal-backdrop"></div>`);
  const modal = el(`
    <div class="modal">
      <h3>Share this game</h3>
      <p class="small-note">Anyone who opens this link will load <b>this exact game</b> (${esc(g.users.map(u=>u.name).join(", "))}). They can also click "Sync Scores" to pull the latest leaderboard.</p>
      <div class="link-box">
        <input type="text" readonly value="${esc(url)}" id="shareUrl">
        <button class="btn btn-primary" id="copy">Copy</button>
      </div>
      <p class="small-note">Want a shorter URL? Paste into <a href="https://tinyurl.com" target="_blank">tinyurl.com</a> or <a href="https://bitly.com" target="_blank">bitly.com</a>.</p>
      <div class="row"><button class="btn btn-outline" id="close">Close</button></div>
    </div>
  `);
  backdrop.appendChild(modal);
  document.body.appendChild(backdrop);
  modal.querySelector("#copy").onclick = () => {
    const inp = modal.querySelector("#shareUrl");
    inp.select(); document.execCommand("copy");
    modal.querySelector("#copy").textContent = "Copied!";
  };
  modal.querySelector("#close").onclick = () => backdrop.remove();
}

// ------------------------- ADMIN -------------------------------------------
function renderAdmin() {
  const wrap = document.createElement("div");
  wrap.appendChild(el(`<h2 class="page-title">Admin — Rankings & Data</h2>`));
  wrap.appendChild(el(`<div class="flash flash-info">Update the Official World Golf Ranking snapshot, major winners history, or venues. Data is stored in your browser — editing here does not affect games already started unless you re-create them.</div>`));

  // OWGR
  const owgr = el(`<div class="admin-section"><h3>Official World Golf Ranking (Top 20)</h3><p class="small-note">One player per line, ordered by ranking. Source: <a href="https://www.owgr.com/" target="_blank">owgr.com</a></p><textarea id="owgr">${esc(state.settings.owgrTop.join("\n"))}</textarea><div class="row"><button class="btn btn-primary" id="saveOwgr">Save</button></div></div>`);
  owgr.querySelector("#saveOwgr").onclick = () => {
    state.settings.owgrTop = owgr.querySelector("#owgr").value.split("\n").map(s=>s.trim()).filter(Boolean);
    saveSettings(); alert("OWGR list saved.");
  };
  wrap.appendChild(owgr);

  // Major winners
  const mw = el(`<div class="admin-section"><h3>Historic Major Winners</h3><p class="small-note">One player per line. Players NOT in this list qualify for "No Major Wins".</p><textarea id="mw">${esc(state.settings.majorWinners.join("\n"))}</textarea><div class="row"><button class="btn btn-primary" id="save">Save</button></div></div>`);
  mw.querySelector("#save").onclick = () => { state.settings.majorWinners = mw.querySelector("#mw").value.split("\n").map(s=>s.trim()).filter(Boolean); saveSettings(); alert("Saved."); };
  wrap.appendChild(mw);

  // International
  const intl = el(`<div class="admin-section"><h3>Known International-Born Players</h3><p class="small-note">Used to flag internationals when ESPN country code is missing.</p><textarea id="intl">${esc(state.settings.international.join("\n"))}</textarea><div class="row"><button class="btn btn-primary" id="save">Save</button></div></div>`);
  intl.querySelector("#save").onclick = () => { state.settings.international = intl.querySelector("#intl").value.split("\n").map(s=>s.trim()).filter(Boolean); saveSettings(); alert("Saved."); };
  wrap.appendChild(intl);

  // Venues
  const ven = el(`<div class="admin-section"><h3>Venues by Year</h3><p class="small-note">Displayed under each major on the home screen.</p><textarea id="ven" style="min-height:260px">${esc(JSON.stringify({ venues: Object.fromEntries(MAJOR_ORDER.map(mid=>[mid, state.settings.majors[mid].venues])) }, null, 2))}</textarea><div class="row"><button class="btn btn-primary" id="save">Save</button></div></div>`);
  ven.querySelector("#save").onclick = () => {
    try {
      const parsed = JSON.parse(ven.querySelector("#ven").value);
      MAJOR_ORDER.forEach(mid => { if (parsed.venues[mid]) state.settings.majors[mid].venues = parsed.venues[mid]; });
      saveSettings(); alert("Venues saved."); render();
    } catch(e) { alert("Invalid JSON: "+e.message); }
  };
  wrap.appendChild(ven);

  // Current games (for debugging/deletion)
  const games = el(`<div class="admin-section"><h3>Saved Games</h3><div id="list"></div></div>`);
  const list = games.querySelector("#list");
  const keys = Object.keys(state.games);
  if (!keys.length) list.appendChild(el(`<div class="small-note">No saved games.</div>`));
  keys.forEach(k => {
    const g = state.games[k];
    const row = el(`<div class="game-row"><div>${esc(state.settings.majors[g.majorId].short)} ${g.year} — ${esc(g.users.map(u=>u.name).join(", "))} <span class="ownership-badge">${g.id}</span></div><div class="status"><button class="btn btn-red btn-small del">Delete</button></div></div>`);
    row.querySelector(".del").onclick = () => { if (confirm("Delete game?")) { delete state.games[k]; saveGames(); render(); } };
    list.appendChild(row);
  });
  wrap.appendChild(games);

  return wrap;
}

parseHash();
render();
