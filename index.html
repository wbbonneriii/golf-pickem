<script type="text/babel" data-presets="react">
/* global React, ReactDOM, LZString, MAJOR_PICKEM_DATA */
const { useState, useEffect, useMemo, useCallback, useRef } = React;
const D = MAJOR_PICKEM_DATA;

// ============================================================================
// CONSTANTS
// ============================================================================
const CATEGORIES = [
  { id: "top10_1",    label: "Top 10 Pick #1",  desc: "A player in the Top 10 of the official world golf rankings" },
  { id: "top10_2",    label: "Top 10 Pick #2",  desc: "A player in the Top 10 of the official world golf rankings" },
  { id: "intl",       label: "International",   desc: "An international-born player not in the Top 10 of the world ranking" },
  { id: "noMajor",    label: "No Major Wins",   desc: "A player that has never won a major" },
  { id: "firstTimer", label: "First Timer",     desc: "A player playing this major for the very first time" },
];

const MAJOR_KEYS = [
  { id: "masters", label: "The US Masters" },
  { id: "pga",     label: "The PGA Championship" },
  { id: "usopen",  label: "The US Open" },
  { id: "open",    label: "The Open Championship" },
];

const YEARS = [2024, 2025, 2026, 2027, 2028];
const DEFAULT_YEAR = 2026;

// ============================================================================
// HELPERS
// ============================================================================
function shortId() {
  // 7-char URL-safe id
  return Math.random().toString(36).slice(2, 9);
}

function classify(player, cat) {
  if (!player) return false;
  switch (cat) {
    case "top10_1":
    case "top10_2":
      return player.owgr && player.owgr <= 10;
    case "intl":
      return player.country && player.country !== "USA" && (!player.owgr || player.owgr > 10);
    case "noMajor":
      return !player.hasMajor;
    case "firstTimer":
      return !!player.mastersFirst;  // generic flag ("first time at this major")
    default:
      return false;
  }
}

function allPickedNames(game) {
  const names = new Set();
  for (const u of game.users) {
    u.primary.forEach((p) => p && names.add(p));
    u.alternates.forEach((p) => p && names.add(p));
  }
  return names;
}

function availablePlayers(game, category, field) {
  const picked = allPickedNames(game);
  return field
    .filter((p) => !picked.has(p.name))
    .filter((p) => (category === "any" ? true : classify(p, category)))
    .sort((a, b) => (a.owgr || 9999) - (b.owgr || 9999));
}

// Snake-draft pick order for N users, given 0-based overall pick index.
// Round 0 (picks 0..N-1):       0,1,...,N-1     (up)
// Round 1 (picks N..2N-1):      N-1,...,1,0     (down)
// Round r:                      up if r even, down if r odd
function userForPick(N, pickIndex) {
  const round = Math.floor(pickIndex / N);
  const idxInRound = pickIndex % N;
  return round % 2 === 0 ? idxInRound : N - 1 - idxInRound;
}

const TOTAL_PRIMARY_PICKS = (nUsers) => 5 * nUsers;
const TOTAL_ALT_PICKS     = (nUsers) => 2 * nUsers;
const TOTAL_PICKS         = (nUsers) => 7 * nUsers;

// ----- localStorage ---------------------------------------------------------
const LS_KEY = "major-pickem-games";
const LS_OWGR = "major-pickem-owgr";

// Live OWGR cache: { fetchedAt: iso, ranks: { "Scottie Scheffler": 1, ... }, source: "espn"|"manual" }
function loadOwgrCache() {
  try { return JSON.parse(localStorage.getItem(LS_OWGR) || "null"); } catch (e) { return null; }
}
function saveOwgrCache(obj) {
  try { localStorage.setItem(LS_OWGR, JSON.stringify(obj)); } catch (e) {}
}
function owgrCacheAgeHours() {
  const c = loadOwgrCache();
  if (!c || !c.fetchedAt) return Infinity;
  return (Date.now() - new Date(c.fetchedAt).getTime()) / 3.6e6;
}
// Normalise a player name for matching across sources (ignore case, accents, punctuation)
function normName(s) {
  return (s || "")
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .toLowerCase()
    .replace(/[^a-z0-9 ]/g, "")
    .replace(/\s+/g, " ")
    .trim();
}
// Return a field array with owgr values overlaid from the live cache (where a match exists).
function applyOwgrOverlay(field) {
  const c = loadOwgrCache();
  if (!c || !c.ranks) return field;
  const idx = {};
  for (const [n, r] of Object.entries(c.ranks)) idx[normName(n)] = r;
  return field.map((p) => {
    const r = idx[normName(p.name)];
    return r != null ? { ...p, owgr: r } : p;
  });
}

// Pull the current OWGR from ESPN's rankings endpoint (CORS-enabled, no API key).
// Response shape: { rankings: [ { id, name, type, ranks: [ { current, athlete: { displayName, ... } } ] } ] }
async function fetchLiveOwgr() {
  const url = "https://site.api.espn.com/apis/site/v2/sports/golf/rankings";
  const res = await fetch(url);
  if (!res.ok) throw new Error(`ESPN rankings returned ${res.status}`);
  const data = await res.json();
  const block =
    (data.rankings || []).find((r) => /world/i.test(r.name || "") || /owgr/i.test(r.shortName || r.name || "")) ||
    (data.rankings || [])[0];
  if (!block || !Array.isArray(block.ranks)) throw new Error("No rankings block returned by ESPN");
  const ranks = {};
  for (const row of block.ranks) {
    const name = (row.athlete && (row.athlete.displayName || row.athlete.fullName)) || "";
    const r = Number(row.current);
    if (name && r > 0) ranks[name] = r;
  }
  if (Object.keys(ranks).length === 0) throw new Error("ESPN rankings response was empty");
  const cache = { fetchedAt: new Date().toISOString(), ranks, source: "espn", count: Object.keys(ranks).length };
  saveOwgrCache(cache);
  return cache;
}

function loadGames() {
  try { return JSON.parse(localStorage.getItem(LS_KEY) || "{}"); } catch (e) { return {}; }
}
function saveGame(game) {
  const all = loadGames();
  all[game.id] = { ...game, updatedAt: new Date().toISOString() };
  localStorage.setItem(LS_KEY, JSON.stringify(all));
}
function deleteGame(id) {
  const all = loadGames();
  delete all[id];
  localStorage.setItem(LS_KEY, JSON.stringify(all));
}

// ----- URL hash encoding ---------------------------------------------------
function encodeGameToHash(game) {
  const json = JSON.stringify(game);
  return "#g=" + LZString.compressToEncodedURIComponent(json);
}
function decodeGameFromHash() {
  const h = window.location.hash || "";
  const m = h.match(/^#g=([\s\S]+)$/);
  if (!m) return null;
  try {
    const json = LZString.decompressFromEncodedURIComponent(m[1]);
    return json ? JSON.parse(json) : null;
  } catch (e) { return null; }
}
function buildShareUrl(game) {
  const base = window.location.origin + window.location.pathname;
  return base + encodeGameToHash(game);
}

// ============================================================================
// ESPN live sync (CORS-friendly public endpoints)
// ============================================================================
async function espnFindEvent(tournament) {
  // Use the scoreboard around the tournament dates, look for a matching event name.
  const [m, yr] = [tournament.major, tournament.year];
  // Rough date windows by major
  const window_ = {
    masters: `${yr}0407-${yr}0414`,
    pga:     `${yr}0512-${yr}0519`,
    usopen:  `${yr}0611-${yr}0618`,
    open:    `${yr}0715-${yr}0722`,
  }[m];
  const label = {
    masters: /masters/i,
    pga:     /pga championship/i,
    usopen:  /u\.?s\.? open/i,
    open:    /the open|open championship|british open/i,
  }[m];

  const url = `https://site.api.espn.com/apis/site/v2/sports/golf/pga/scoreboard?dates=${window_}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`ESPN scoreboard returned ${res.status}`);
  const data = await res.json();
  const ev = (data.events || []).find((e) => label.test(e.name || "") || label.test(e.shortName || ""));
  if (!ev) throw new Error(`Could not find ${m} ${yr} on ESPN`);
  return ev;
}

async function espnFetchLeaderboard(tournament) {
  const ev = await espnFindEvent(tournament);
  // The scoreboard already contains the full competitors list with scores + status
  const comp = ev.competitions && ev.competitions[0];
  if (!comp) throw new Error("No competition in event");
  const statusDesc = (comp.status && comp.status.type && comp.status.type.description) || "";
  const isComplete = comp.status && comp.status.type && comp.status.type.completed;
  const scores = {};
  let winnerName = null;
  (comp.competitors || []).forEach((c) => {
    const name = (c.athlete && c.athlete.displayName) || "";
    // score: use 'score' (total to par) — ESPN returns stringified like "-12" or "E"
    const raw = c.score || c.linescores?.[0]?.value || "E";
    const toPar = raw === "E" ? 0 : parseInt(raw, 10);
    // Cut status is in c.status?.type?.state or in displayValue "CUT"
    const stat = (c.status && c.status.type && c.status.type.description) || "";
    let cut = null;
    if (/cut/i.test(stat)) cut = false;
    else if (c.status && c.status.period && c.status.period >= 3) cut = true;
    else if (isComplete) cut = true; // finished 72 holes
    scores[name.toLowerCase()] = {
      score: isNaN(toPar) ? 0 : toPar,
      cut,
      position: c.status?.position?.displayName || c.status?.position?.id || "",
      display: raw,
    };
    if (isComplete && (c.status?.position?.id === "1" || c.winner === true)) {
      winnerName = name;
    }
  });
  return { scores, isComplete, statusDesc, winnerName, eventName: ev.name, eventId: ev.id };
}

// UI ATOMS
// ============================================================================
function Header({ onBack, showBack }) {
  return (
    <header className="bg-masters text-white">
      <div className="max-w-6xl mx-auto px-6 py-5 flex items-center justify-between">
        <div>
          <h1 className="font-serif text-3xl leading-none"><span aria-hidden>⛳</span> Major Pick'em</h1>
          <div className="text-xs tracking-wide text-white/80 mt-1">Golf Major Championship Draft</div>
        </div>
        {showBack && (
          <button className="underline underline-offset-4 text-sm hover:text-white/90" onClick={onBack}>
            ← Back to Tournaments

}

function YearTabs({ year, setYear }) {
  return (
    <div className="inline-flex rounded-md border border-gray-300 overflow-hidden bg-white text-sm">
      {YEARS.map((y) => (
        <button key={y} onClick={() => setYear(y)}
          className={`px-3 py-1.5 font-medium ${y === year ? "bg-masters text-white" : "text-gray-700 hover:bg-gray-50"}`}>
          {y}

// ============================================================================
// SCREEN: HOME (tournament picker)
// ============================================================================
function HomeScreen({ onNewGame, onOpenGame, refreshKey }) {
  const [year, setYear] = useState(DEFAULT_YEAR);
  const games = useMemo(() => loadGames(), [refreshKey]);
  const tournamentsForYear = MAJOR_KEYS.map(({ id, label }) => {
    const key = `${id}-${year}`;
    const t = D.TOURNAMENTS[key];
    return { ...t, majorId: id, majorLabel: label };
  });

  // Live OWGR state
  const [owgrCache, setOwgrCache] = useState(() => loadOwgrCache());
  const [owgrSyncing, setOwgrSyncing] = useState(false);
  const [owgrError, setOwgrError] = useState("");
  const runOwgrSync = useCallback(async () => {
    setOwgrSyncing(true); setOwgrError("");
    try {
      const cache = await fetchLiveOwgr();
      setOwgrCache(cache);
    } catch (e) {
      setOwgrError(e.message || String(e));
    } finally {
      setOwgrSyncing(false);
    }
  }, []);
  // Auto-sync on first load if cache is stale (>24h) or missing
  useEffect(() => {
    if (owgrCacheAgeHours() > 24) { runOwgrSync(); }
  }, [runOwgrSync]);
  const owgrStatus = owgrSyncing
    ? "Syncing OWGR…"
    : owgrError
    ? `OWGR sync failed: ${owgrError}`
    : owgrCache
    ? `OWGR: ${owgrCache.count || Object.keys(owgrCache.ranks || {}).length} ranked players · synced ${new Date(owgrCache.fetchedAt).toLocaleString()}`
    : "OWGR not yet synced — using seed rankings from data.js";

  return (
    <main className="max-w-6xl mx-auto px-6 py-8">
      <div className="flex items-end justify-between mb-6 flex-wrap gap-4">
        <h2 className="font-serif text-3xl">{year} Men's Golf Majors</h2>
        <div className="flex items-center gap-3">
          <YearTabs year={year} setYear={setYear} />
          <button className="btn-ghost" onClick={runOwgrSync} disabled={owgrSyncing}>
            {owgrSyncing ? "⟳ Syncing…" : "⟳ Sync OWGR"}
          </button>
          <button className="btn-ghost" onClick={() => alert("Admin panel — edit data.js to add or adjust player / venue info.")}>
            ⚙ Admin
          </button>
        </div>
      </div>
      <div className={`text-xs mb-4 ${owgrError ? "text-red-600" : "text-gray-500"}`}>{owgrStatus}</div>

      <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
        {tournamentsForYear.map((t) => {
          const myGames = Object.values(games).filter((g) => g.tournamentKey === t.key);
          return (
            <div key={t.key} className="card">
              <div className="flex items-start justify-between">
                <div>
                  <h3 className="font-serif text-xl">{t.majorLabel}</h3>
                  <div className="text-sm text-gray-500">{t.venue || "Venue TBD"}</div>
                </div>
                <button className="btn-primary" onClick={() => onNewGame(t)}>+ New Game</button>
              </div>
              <div className="mt-4 space-y-2">
                {myGames.length === 0 && (
                  <div className="text-sm text-gray-400">No games started</div>
                )}
                {myGames.map((g) => (
                  <button key={g.id} onClick={() => onOpenGame(g)}
                    className="w-full flex items-center justify-between px-3 py-2 rounded-md bg-cream border border-gray-100 hover:bg-white text-sm">
                    <span className="truncate text-gray-700">{g.users.map((u) => u.name || "Unnamed").join(", ")}</span>
                    <span className="flex items-center gap-2">
                      <span className="chip bg-masters/10 text-masters">{g.draftComplete ? "Complete" : "Drafting"}</span>
                      <span onClick={(e) => { e.stopPropagation(); if (confirm("Delete this game?")) { deleteGame(g.id); onOpenGame(null); } }}
                            className="text-gray-400 hover:text-red">×</span>
                    </span>
                  </button>
                ))}
              </div>
            </div>
          );
        })}
      </div>
      <div className="mt-10 text-xs text-gray-400">
        Games are saved locally in your browser. Share any game's URL to send a live view to other players.
      </div>
    </main>
  );
}

// ============================================================================
// SCREEN: USER COUNT
// ============================================================================
function UserCountScreen({ tournament, onNext }) {
  const [n, setN] = useState(3);
  return (
    <main className="max-w-3xl mx-auto px-6 py-12">
      <div className="card">

        <div className="flex items-center gap-2">
          <button className="btn-ghost w-12 text-xl" onClick={() => setN(Math.max(2, n - 1))}>−</button>
          <div className="px-5 py-2 border rounded-md text-xl font-bold w-16 text-center">{n}</div>
          <button className="btn-ghost w-12 text-xl border-masters" onClick={() => setN(Math.min(10, n + 1))}>+</button>
        </div>
        <button className="btn-primary mt-6 w-full py-3" onClick={() => onNext(n)}>Next: Enter Names</button>
      </div>

}

// ============================================================================
// SCREEN: USER NAMES
// ============================================================================
function UserNamesScreen({ tournament, numUsers, onBack, onStart }) {
  const [names, setNames] = useState(Array.from({ length: numUsers }, () => ""));
  const canStart = names.every((n) => n.trim().length > 0);
  return (
    <main className="max-w-3xl mx-auto px-6 py-12">
      <div className="card">
        <h2 className="font-serif text-2xl">{tournament.label}</h2>
        <div className="text-sm text-gray-500">{tournament.venue}</div>
        <h3 className="font-semibold mt-6 mb-3">Enter player names</h3>
        <div className="space-y-3">
          {names.map((n, i) => (
            <div key={i}>
              <label className="block text-sm font-medium text-gray-500 mb-1">Player {i + 1}</label>
              <input className="w-full border rounded-md px-3 py-2" placeholder={`Player ${i + 1}`}
                value={n} onChange={(e) => { const c = names.slice(); c[i] = e.target.value; setNames(c); }} />
            </div>
          ))}
        </div>
        <div className="mt-6 grid grid-cols-2 gap-3">
          <button className="btn-ghost py-3" onClick={onBack}>Back</button>
          <button className={`py-3 ${canStart ? "btn-primary" : "btn-ghost"}`}
                  disabled={!canStart} onClick={() => onStart(names.map((n) => n.trim()))}>
            Start Draft
          </button>
        </div>
      </div>
    </main>
  );
}

// ============================================================================
// SCREEN: DRAFT
// ============================================================================
function DraftScreen({ game, tournament, onUpdate, onBack, onComplete }) {
  const N = game.users.length;
  const totalPrimary = TOTAL_PRIMARY_PICKS(N);
  const totalAlts = TOTAL_ALT_PICKS(N);
  const total = TOTAL_PICKS(N);

  const pickIndex = game.pickIndex || 0;
  const phase = pickIndex < totalPrimary ? "primary" : pickIndex < total ? "alt" : "done";
  const currentUserIdx = userForPick(N, pickIndex);
  const currentUser = game.users[currentUserIdx];

  const [selectedCat, setSelectedCat] = useState(null);
  const [selectedPlayer, setSelectedPlayer] = useState("");

  useEffect(() => { setSelectedCat(null); setSelectedPlayer(""); }, [pickIndex]);

  const picksSoFarForUser = currentUser ? currentUser.primary.filter(Boolean).length : 0;
  const altsSoFarForUser = currentUser ? currentUser.alternates.filter(Boolean).length : 0;

  const field = applyOwgrOverlay(tournament.field || []);

  // Determine display title
  const roundIdxForUser =
    phase === "primary"
      ? picksSoFarForUser + 1
      : altsSoFarForUser + 1;

  if (phase === "done") {
    onComplete();
    return null;
  }

  function handlePick(catId, playerName) {
    const g = JSON.parse(JSON.stringify(game));
    const u = g.users[currentUserIdx];
    if (phase === "primary") {
      const slotIdx = CATEGORIES.findIndex((c) => c.id === catId);
      if (u.primary[slotIdx]) return alert("Already picked for this category");
      u.primary[slotIdx] = playerName;
    } else {
      const freeSlot = u.alternates.indexOf(null);
      if (freeSlot < 0) return;
      u.alternates[freeSlot] = playerName;
    }
    g.pickIndex = pickIndex + 1;
    if (g.pickIndex >= total) g.draftComplete = true;
    onUpdate(g);
  }

  function handleReset() {
    if (!confirm("Reset the draft? All picks will be cleared.")) return;
    const g = JSON.parse(JSON.stringify(game));
    g.users = g.users.map((u) => ({ ...u, primary: Array(5).fill(null), alternates: [null, null] }));
    g.pickIndex = 0;
    g.draftComplete = false;
    onUpdate(g);
  }

  return (
    <main className="max-w-5xl mx-auto px-6 py-8">
      <div className="flex items-center justify-between mb-6">
        <div>
          <h2 className="font-serif text-3xl">{tournament.label} — Draft</h2>
          <div className="text-sm text-gray-500">{tournament.venue}</div>
        </div>
        <button className="btn-danger" onClick={handleReset}>Reset Draft</button>
      </div>

      <div className="card mb-4">
        <div className="font-semibold text-lg">
          {currentUser.name} — {phase === "primary" ? `Pick ${picksSoFarForUser + 1} of 5` : `Alternate ${altsSoFarForUser + 1} of 2`}
        </div>
        <div className="text-sm text-gray-500">
          {phase === "primary" ? "Select a category and player below" : "Pick an alternate (any player, fills first empty slot)"}
        </div>
        <div className="mt-2 text-xs text-gray-400">
          Overall pick {pickIndex + 1} of {total} · Snake draft
        </div>
      </div>

      {phase === "primary" ? (
        <div className="space-y-3">
          {CATEGORIES.map((c) => {
            const slotIdx = CATEGORIES.findIndex((x) => x.id === c.id);
            const filled = currentUser.primary[slotIdx];
            const options = availablePlayers(game, c.id, field);
            return (
              <div key={c.id} className="card flex flex-col md:flex-row md:items-center gap-3">
                <div className="md:flex-1">
                  <div className="font-semibold">{c.label} {filled && <span className="text-masters">— {filled}</span>}</div>
                  <div className="text-sm text-gray-500">{c.desc}</div>
                </div>
                <div className="flex items-center gap-2">
                  <select
                    className="border rounded-md px-2 py-1.5 text-sm min-w-[14rem]"
                    disabled={!!filled}
                    value={selectedCat === c.id ? selectedPlayer : ""}
                    onChange={(e) => { setSelectedCat(c.id); setSelectedPlayer(e.target.value); }}>
                    <option value="">Select player…</option>
                    {options.map((p) => (
                      <option key={p.name} value={p.name}>
                        {p.owgr ? `#${p.owgr}  ` : "     "}{p.name} ({p.country})
                      </option>
                    ))}
                  </select>
                  <button
                    className={selectedCat === c.id && selectedPlayer ? "btn-primary" : "btn-ghost"}
                    disabled={!!filled || !(selectedCat === c.id && selectedPlayer)}
                    onClick={() => handlePick(c.id, selectedPlayer)}>
                    Pick
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      ) : (
        <div className="card">
          <div className="font-semibold mb-2">Select an alternate</div>
          <div className="text-sm text-gray-500 mb-4">Alternates can be any player in the field who hasn't been picked yet.</div>
          <div className="flex items-center gap-2">
            <select className="border rounded-md px-2 py-1.5 text-sm min-w-[16rem]"
              value={selectedPlayer}
              onChange={(e) => setSelectedPlayer(e.target.value)}>
              <option value="">Select player…</option>
              {availablePlayers(game, "any", field).map((p) => (
                <option key={p.name} value={p.name}>
                  {p.owgr ? `#${p.owgr}  ` : "     "}{p.name} ({p.country}){p.hasMajor ? " — major winner" : ""}{p.mastersFirst ? " — 1st Masters" : ""}
                </option>
              ))}
            </select>
            <button className={selectedPlayer ? "btn-primary" : "btn-ghost"}
                    disabled={!selectedPlayer}
                    onClick={() => handlePick("alt", selectedPlayer)}>Pick Alternate</button>
          </div>
        </div>
      )}

      <div className="mt-8 grid grid-cols-1 md:grid-cols-2 gap-4">
        {game.users.map((u, i) => (
          <div key={i} className={`card ${i === currentUserIdx ? "border-masters ring-1 ring-masters/30" : ""}`}>
            <div className="flex items-center justify-between mb-2">
              <div className="font-semibold">{u.name}</div>
              <div className="text-xs text-gray-400">{u.primary.filter(Boolean).length}/5 picks · {u.alternates.filter(Boolean).length}/2 alts</div>
            </div>
            <ul className="text-sm space-y-1">
              {CATEGORIES.map((c, ci) => (
                <li key={c.id} className="flex justify-between">
                  <span className="text-gray-500">{c.label}</span>
                  <span className="font-medium">{u.primary[ci] || <span className="text-gray-300">—</span>}</span>
                </li>
              ))}
              <li className="pt-1 mt-1 border-t text-xs text-gray-400">Alternates</li>
              {[0, 1].map((ai) => (
                <li key={ai} className="flex justify-between text-sm">
                  <span className="text-gray-500">Alt {ai + 1}</span>
                  <span>{u.alternates[ai] || <span className="text-gray-300">—</span>}</span>
                </li>
              ))}
            </ul>
          </div>
        ))}
      </div>
    </main>
  );
}

// ============================================================================
// SCREEN: SCOREBOARD
// ============================================================================
function ScoreboardScreen({ game, tournament, onUpdate, onBack, onReset, onViewDraft }) {
  const [status, setStatus] = useState("");
  const [busy, setBusy] = useState(false);

  const field = applyOwgrOverlay(tournament.field || []);
  const playerLookup = Object.fromEntries(field.map((p) => [p.name, p]));

  const scores = game.scores || {};
  function playerScore(name) {
    const s = scores[name.toLowerCase()];
    return s || { score: null, cut: null, display: "—" };
  }

  async function syncScores() {
    setBusy(true); setStatus("Fetching from ESPN…");
    try {
      const { scores: s, isComplete, statusDesc, winnerName, eventName } = await espnFetchLeaderboard(tournament);
      const g = JSON.parse(JSON.stringify(game));
      g.scores = s;
      g.tournamentStatus = statusDesc;
      g.tournamentComplete = !!isComplete;
      g.tournamentWinner = winnerName || g.tournamentWinner;
      g.lastSyncedAt = new Date().toISOString();
      onUpdate(g);
      // Count how many drafted players matched
      const allTeam = [...new Set(g.users.flatMap((u) => [...u.primary, ...u.alternates]).filter(Boolean))];
      const matched = allTeam.filter((n) => s[n.toLowerCase()]).length;
      setStatus(`${eventName}: ${statusDesc}. Matched ${matched}/${allTeam.length} drafted players. Cut status updated.`);
    } catch (e) {
      setStatus(`Sync failed: ${e.message}. You can enter scores manually below.`);
    } finally { setBusy(false); }
  }

  function toggleCut(playerName) {
    const g = JSON.parse(JSON.stringify(game));
    if (!g.scores) g.scores = {};
    const key = playerName.toLowerCase();
    const cur = g.scores[key] || {};
    g.scores[key] = { ...cur, cut: cur.cut === true ? false : cur.cut === false ? null : true };
    onUpdate(g);
  }

  function manualScore(playerName, value) {
    const g = JSON.parse(JSON.stringify(game));
    if (!g.scores) g.scores = {};
    const key = playerName.toLowerCase();
    const toPar = value === "" || value === "E" ? 0 : parseInt(value, 10);
    g.scores[key] = { ...(g.scores[key] || {}), score: isNaN(toPar) ? 0 : toPar, display: value };
    onUpdate(g);
  }

  function handleSwap(userIdx, primarySlot, altIdx) {
    const g = JSON.parse(JSON.stringify(game));
    const u = g.users[userIdx];
    const tmp = u.primary[primarySlot];
    u.primary[primarySlot] = u.alternates[altIdx];
    u.alternates[altIdx] = tmp;
    onUpdate(g);
  }

  // Compute team stats
  function teamStats(u) {
    const picks = u.primary.filter(Boolean);
    let total = 0, madeCut = 0, hasWinner = false;
    picks.forEach((n) => {
      const s = playerScore(n);
      if (s.score != null) total += s.score;
      if (s.cut === true) madeCut += 1;
      if (game.tournamentWinner && game.tournamentWinner.toLowerCase() === n.toLowerCase()) hasWinner = true;
    });
    return { total, madeCut, hasWinner };
  }

  const teams = game.users.map((u, i) => ({ idx: i, u, ...teamStats(u) }));

  // Determine winner
  let winnerIdx = -1, winReason = "";
  const withWinner = teams.filter((t) => t.hasWinner);
  if (withWinner.length > 0) {
    winnerIdx = withWinner[0].idx;
    winReason = `Picked the tournament winner (${game.tournamentWinner})`;
  } else if (game.tournamentComplete || (game.lastSyncedAt && teams.some((t) => t.madeCut > 0))) {
    const maxCut = Math.max(...teams.map((t) => t.madeCut));
    const tied = teams.filter((t) => t.madeCut === maxCut);
    if (tied.length === 1) {
      winnerIdx = tied[0].idx;
      winReason = `Most players made the cut (${maxCut})`;
    } else {
      const minScore = Math.min(...tied.map((t) => t.total));
      const finalTie = tied.filter((t) => t.total === minScore);
      if (finalTie.length === 1) {
        winnerIdx = finalTie[0].idx;
        winReason = `Tied for most cuts (${maxCut}), lowest cumulative score (${minScore > 0 ? "+" : ""}${minScore})`;
      }
    }
  }

  const shareUrl = buildShareUrl(game);

  return (
    <main className="max-w-6xl mx-auto px-6 py-8">
      <div className="flex flex-wrap items-start justify-between gap-3 mb-4">
        <div>
          <h2 className="font-serif text-3xl">{tournament.label} — Scoreboard</h2>
          <div className="text-sm text-gray-500">{tournament.venue}</div>
        </div>
        <div className="flex gap-2 flex-wrap">
          <button className="btn-primary" disabled={busy} onClick={syncScores}>⟳ Sync Scores</button>
          <button className="btn-ghost" onClick={() => {
            navigator.clipboard.writeText(shareUrl);
            setStatus("Share URL copied to clipboard.");
          }}>🔗 Share Link</button>
          <button className="btn-ghost" onClick={onViewDraft}>View Draft</button>
          <button className="btn-danger" onClick={onReset}>Reset</button>
        </div>
      </div>

      <div className="text-sm text-gray-500 mb-3">
        {status || (game.lastSyncedAt ? `Last synced ${new Date(game.lastSyncedAt).toLocaleString()}` : "Click 'Sync Scores' to pull live data from ESPN.")}
      </div>

      {winnerIdx >= 0 && (
        <div className="mb-4 bg-masters text-white rounded-lg px-4 py-3 flex items-center gap-2">
          <span className="font-serif text-xl">🏆 {game.users[winnerIdx].name} wins</span>
          <span className="opacity-90">— {winReason}</span>
        </div>
      )}

      <div className="mb-4 p-3 rounded-lg bg-cream border border-gray-100 text-sm">
        <div className="font-medium mb-1">Share this game</div>
        <div className="flex gap-2 items-center">
          <input className="share-input flex-1 px-2 py-1 border rounded bg-white text-xs" readOnly value={shareUrl} onFocus={(e) => e.target.select()} />
          <button className="btn-ghost text-xs" onClick={() => { navigator.clipboard.writeText(shareUrl); setStatus("Share URL copied."); }}>Copy</button>
        </div>
        <div className="text-xs text-gray-500 mt-1">This link encodes the full game state — anyone who opens it sees the live scoreboard for this specific draft.</div>
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
        {teams.map((t) => {
          const u = t.u;
          const isWinner = t.idx === winnerIdx;
          return (
            <div key={t.idx} className={`card ${isWinner ? "border-yellow-500 ring-2 ring-yellow-400" : ""}`}>
              {isWinner && (
                <div className="chip bg-green-50 text-green-700 mb-2">🏆 Winner</div>
              )}
              <div className="flex justify-between items-baseline">
                <div className="font-serif text-xl">{u.name}</div>
                <div className="text-right">
                  <div className={`font-bold text-lg ${t.total < 0 ? "text-masters" : "text-red"}`}>
                    {game.lastSyncedAt ? (t.total > 0 ? "+" : "") + t.total : "—"}
                  </div>
                  <div className="text-xs text-gray-500">{t.madeCut}/5 made cut</div>
                </div>
              </div>
              <table className="w-full text-sm mt-3">
                <thead className="text-xs text-gray-400">
                  <tr>
                    <th className="text-left py-1">Player</th>
                    <th className="text-left">Category</th>
                    <th className="text-center">Score</th>
                    <th className="text-center">Cut</th>
                    <th className="text-right">Sub</th>
                  </tr>
                </thead>
                <tbody>
                  {CATEGORIES.map((c, ci) => {
                    const p = u.primary[ci];
                    if (!p) return null;
                    const s = playerScore(p);
                    return (
                      <tr key={ci} className="border-t border-gray-100">
                        <td className="py-1.5 font-medium">{p}</td>
                        <td className="text-gray-500">{c.label.replace(/^Top 10 Pick /,"Top 10 Pick ")}</td>
                        <td className="text-center">
                          <input className={`w-12 text-center font-medium ${s.score != null && s.score < 0 ? "text-masters" : "text-red"} bg-transparent`}
                                 value={s.score == null ? "" : (s.score === 0 ? "E" : (s.score > 0 ? "+"+s.score : s.score))}
                                 onChange={(e) => manualScore(p, e.target.value.replace(/^\+/, "").replace(/^E$/, "0"))} />
                        </td>
                        <td className="text-center cursor-pointer" onClick={() => toggleCut(p)}>
                          {s.cut === true ? "✓" : s.cut === false ? "—" : <span className="text-gray-300">?</span>}
                        </td>
                        <td className="text-right">
                          <select className="border rounded px-1 py-0.5 text-xs"
                                  defaultValue=""
                                  onChange={(e) => { const ai = parseInt(e.target.value, 10); if (!isNaN(ai)) handleSwap(t.idx, ci, ai); e.target.value=""; }}>
                            <option value="">Swap</option>
                            {u.alternates.map((ap, ai) => ap ? <option key={ai} value={ai}>↔ {ap}</option> : null)}
                          </select>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
              <div className="mt-3 border-t pt-2 text-sm">
                <div className="text-xs text-gray-400 mb-1">Alternates <span className="italic">(not counted in team score)</span></div>
                {u.alternates.map((a, ai) => {
                  if (!a) return null;
                  const s = playerScore(a);
                  return (
                    <div key={ai} className="flex justify-between text-sm py-0.5">
                      <span>{a}</span>
                      <span className="flex items-center gap-3">
                        <span className={s.score != null && s.score < 0 ? "text-masters" : "text-red"}>
                          {s.score == null ? "—" : (s.score === 0 ? "E" : (s.score > 0 ? "+"+s.score : s.score))}
                        </span>
                        <span className="w-3 text-center">{s.cut === true ? "✓" : s.cut === false ? "—" : ""}</span>
                      </span>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>

      <div className="card mt-6">
        <div className="font-semibold mb-1">Winning Rules</div>
        <ul className="text-sm text-gray-600 space-y-0.5">
          <li>· Picking the tournament winner automatically wins the pick'em</li>
          <li>· If no one picks the winner, the user with the most players making the 36-hole cut wins</li>
          <li>· If users have the same number of players making the cut, lowest cumulative team score wins</li>
        </ul>
      </div>
    </main>
  );
}

// ============================================================================
// ROOT APP
// ============================================================================
function App() {
  // Router state
  const [route, setRoute] = useState({ name: "home" });
  const [currentGame, setCurrentGame] = useState(null);
  const [refreshKey, setRefreshKey] = useState(0);

  // On mount, check URL hash for a shared game
  useEffect(() => {
    const g = decodeGameFromHash();
    if (g && g.id) {
      // store locally too
      saveGame(g);
      setCurrentGame(g);
      setRoute({ name: g.draftComplete ? "scoreboard" : "draft" });
    }
  }, []);

  const tournament = currentGame ? D.TOURNAMENTS[currentGame.tournamentKey] : null;

  function updateGame(g) {
    setCurrentGame(g);
    saveGame(g);
    // Keep URL updated (no reload)
    history.replaceState(null, "", encodeGameToHash(g));
  }

  function newGame(t) {
    setRoute({ name: "userCount", tournament: t });
  }
  function chooseCount(n) {
    setRoute({ name: "userNames", tournament: route.tournament, numUsers: n });
  }
  function startDraft(names) {
    const t = route.tournament;
    const game = {
      id: shortId(),
      tournamentKey: t.key,
      users: names.map((n) => ({ name: n, primary: Array(5).fill(null), alternates: [null, null] })),
      pickIndex: 0,
      draftComplete: false,
      createdAt: new Date().toISOString(),
      scores: {},
    };
    saveGame(game);
    setCurrentGame(game);
    setRoute({ name: "draft" });
    history.replaceState(null, "", encodeGameToHash(game));
  }
  function openGame(g) {
    if (!g) { setRefreshKey(refreshKey + 1); return; }
    setCurrentGame(g);
    setRoute({ name: g.draftComplete ? "scoreboard" : "draft" });
    history.replaceState(null, "", encodeGameToHash(g));
  }
  function backHome() {
    setCurrentGame(null);
    setRoute({ name: "home" });
    history.replaceState(null, "", window.location.pathname);
    setRefreshKey(refreshKey + 1);
  }

  return (
    <>
      <Header showBack={route.name !== "home"} onBack={backHome} />
      {route.name === "home" && (
        <HomeScreen
          refreshKey={refreshKey}
          onNewGame={newGame}
          onOpenGame={openGame}
        />
      )}
      {route.name === "userCount" && (
        <UserCountScreen tournament={route.tournament} onNext={chooseCount} />
      )}
      {route.name === "userNames" && (
        <UserNamesScreen
          tournament={route.tournament}
          numUsers={route.numUsers}
          onBack={() => setRoute({ name: "userCount", tournament: route.tournament })}
          onStart={startDraft}
        />
      )}
      {route.name === "draft" && currentGame && tournament && (
        <DraftScreen
          game={currentGame}
          tournament={tournament}
          onUpdate={updateGame}
          onBack={backHome}
          onComplete={() => setRoute({ name: "scoreboard" })}
        />
      )}
      {route.name === "scoreboard" && currentGame && tournament && (
        <ScoreboardScreen
          game={currentGame}
          tournament={tournament}
          onUpdate={updateGame}
          onBack={backHome}
          onViewDraft={() => setRoute({ name: "draft" })}
          onReset={() => {
            if (!confirm("Reset entire game and start over?")) return;
            deleteGame(currentGame.id);
            backHome();
          }}
        />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
